services:
  portal:
    build: .
    image: portal-site:prod
    container_name: portal-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:80"
    networks:
      - shared_gateway
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  shared_gateway:
    external: true
    name: shared_gateway
