<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenithy - Page Not Found</title>
    <meta name="theme-color" content="#fcfcfd" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="alternate icon" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <style>
      :root {
        --surface: #fcfcfd;
        --text: #142030;
        --text-muted: #7c8894;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--text);
        background: var(--surface);
      }

      .card {
        width: min(520px, 90vw);
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(20, 32, 48, 0.08);
        padding: 40px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0 0 24px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        border-radius: 999px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>页面不存在</h1>
      <p>你访问的页面可能已被移动或删除。返回 Zenithy 首页继续探索。</p>
      <a href="https://zenithy.art">返回首页</a>
    </div>
  </body>
</html>
