<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenithy Blog</title>
    <meta name="theme-color" content="#fcfcfd" />
    <meta
      name="description"
      content="Zenithy Blog - 个人经验与产品洞察沉淀。"
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="alternate icon" href="../favicon.svg" />
    <style>
      :root {
        --bg: #fbfcfd;
        --surface: #ffffff;
        --surface-soft: #f2f5f7;
        --text: #142030;
        --muted: #637080;
        --accent: #0d9488;
        --accent-deep: #0a7a70;
        --shadow: 0 18px 40px rgba(20, 32, 48, 0.06);
        --radius: 24px;
        --max-width: 1040px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, rgba(13, 148, 136, 0.06), transparent 36%),
          radial-gradient(circle at 90% 20%, rgba(15, 23, 42, 0.04), transparent 32%),
          var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(var(--max-width), calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 0;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 12px;
      }

      .brand-mark {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--text);
        position: relative;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        background: #fff;
      }

      .hero {
        padding: 60px 0 40px;
        text-align: left;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(36px, 6vw, 64px);
        letter-spacing: -0.04em;
      }

      .hero p {
        margin: 14px 0 0;
        color: var(--muted);
        max-width: 640px;
        line-height: 1.8;
      }

      .post-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
        padding-bottom: 80px;
      }

      .post-card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 24px;
        box-shadow: var(--shadow);
        min-height: 190px;
        display: grid;
        gap: 12px;
      }

      .post-tag {
        display: inline-flex;
        align-items: center;
        height: 26px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(13, 148, 136, 0.1);
        color: var(--accent-deep);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .post-title {
        margin: 0;
        font-size: 20px;
      }

      .post-meta {
        color: var(--muted);
        font-size: 13px;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        background: var(--text);
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.05em;
      }

      .footer {
        padding: 24px 0 36px;
        color: #95a1ad;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          Zenithy Blog
        </div>
        <a class="cta" href="https://zenithy.art">Back to Portal</a>
      </header>

      <section class="hero">
        <h1>经验与洞察</h1>
        <p>
          这里记录产品思考、面试案例与系统迭代经验。内容保持克制、可复用、可执行。
        </p>
      </section>

      <section class="post-grid">
        <article class="post-card">
          <span class="post-tag">Experience</span>
          <h2 class="post-title">从 0 到 1 搭建面试系统的关键决策</h2>
          <div class="post-meta">2026-03-27 · Product Notes</div>
        </article>

        <article class="post-card">
          <span class="post-tag">RAG</span>
          <h2 class="post-title">如何降低 AI 面试官的幻觉率</h2>
          <div class="post-meta">2026-03-27 · Tech Notes</div>
        </article>

        <article class="post-card">
          <span class="post-tag">Iteration</span>
          <h2 class="post-title">短期升级路线与里程碑拆解</h2>
          <div class="post-meta">2026-03-27 · Roadmap</div>
        </article>
      </section>

      <footer class="footer">Zenithy · Blog</footer>
    </div>
  </body>
</html>
