<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenithy - Blog</title>
    <meta name="theme-color" content="#f8f9fa" />
    <meta
      name="description"
      content="Zenithy Blog - Insights & Reflections. A curated space for architectural clarity, purposeful design, and professional growth."
    />
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="alternate icon" href="../favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --background: #f8f9fa;
        --surface: #f8f9fa;
        --surface-container-lowest: #ffffff;
        --surface-container-low: #f1f4f6;
        --surface-container-high: #e3e9ec;
        --surface-container: #eaeff1;
        --surface-variant: #dbe4e7;
        --on-surface: #2b3437;
        --on-surface-variant: #586064;
        --outline-variant: rgba(171, 179, 183, 0.15);
        --tertiary: #03687e;
        --tertiary-dim: #005b6f;
        --on-tertiary: #f1faff;
        --shadow-soft: 0 4px 24px rgba(43, 52, 55, 0.04);
        --shadow-hover: 0 10px 40px rgba(43, 52, 55, 0.08);
        --radius-lg: 2rem;
        --radius-xl: 3rem;
        --max-width: 1200px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
        color: var(--on-surface);
        background: var(--background);
        -webkit-font-smoothing: antialiased;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .grain-texture {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.03;
        z-index: 60;
        background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAOrNarvj8dkgSB1LveB-EWf1olDUKAqbMVBJck6cIGdIu18X6amhxYoOMXvkzSvZ5xo3Gsh90eLzsG3_YFcNokYmhZ-ycEV7AKTEchh99Ou3N6OKR5SeqR5gk6mRGk19QitaHxMuVnAKz0xeABxDouq1bi6XZMn8tQupgvPM0ysYLRNintsN4rKOMWKgnM1h-_m7eMt0uI18RyrQsn6ZvfGnOb9zAowVP0wk2ZNmmACduzUl0Y5t5rxf9DmC7h8bSkPanHLs4X1PEr");
      }

      .page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(248, 249, 250, 0.98);
        backdrop-filter: blur(8px);
      }

      .nav {
        max-width: 1400px;
        margin: 0 auto;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: "Manrope", sans-serif;
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .brand-mark {
        position: relative;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #2b3437;
      }

      .brand-mark::after {
        content: "";
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        background: #fff;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 36px;
        font-size: 14px;
        font-weight: 600;
      }

      .nav-links a {
        color: var(--on-surface-variant);
        transition: color 0.2s ease;
      }

      .nav-links a:hover {
        color: var(--on-surface);
      }

      .nav-links .active {
        color: var(--tertiary);
        border-bottom: 2px solid var(--tertiary);
        padding-bottom: 6px;
      }

      .nav-cta {
        background: linear-gradient(135deg, var(--tertiary), var(--tertiary-dim));
        color: var(--on-tertiary);
        border: none;
        border-radius: 999px;
        padding: 10px 24px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s ease, opacity 0.15s ease;
      }

      .nav-cta:active {
        transform: scale(0.98);
      }

      main {
        flex: 1;
        padding: 80px 0 96px;
      }

      .container {
        width: min(var(--max-width), calc(100% - 64px));
        margin: 0 auto;
      }

      .page-header h1 {
        margin: 0 0 16px;
        font-family: "Manrope", sans-serif;
        font-size: clamp(36px, 5vw, 60px);
        letter-spacing: -0.03em;
      }

      .page-header p {
        margin: 0;
        max-width: 680px;
        color: var(--on-surface-variant);
        font-size: 18px;
        line-height: 1.7;
      }

      .filters {
        margin: 40px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .tag-scroll {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 6px;
      }

      .tag-scroll::-webkit-scrollbar {
        height: 6px;
      }

      .tag-scroll::-webkit-scrollbar-thumb {
        background: rgba(171, 179, 183, 0.4);
        border-radius: 999px;
      }

      .pill {
        border-radius: 999px;
        padding: 8px 20px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        border: none;
        background: var(--surface-container-high);
        color: #47535b;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .pill.active {
        background: var(--on-surface);
        color: var(--surface);
      }

      .pill:hover {
        background: #d1dce0;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 28px;
      }

      .card {
        background: var(--surface-container-lowest);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-soft);
        border: 1px solid var(--outline-variant);
        overflow: hidden;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.6s ease;
      }

      .card:hover img {
        transform: scale(1.04);
      }

      .card-body {
        padding: 32px;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 12px;
        color: var(--on-surface-variant);
        margin-bottom: 16px;
      }

      .meta .tag {
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--tertiary);
        font-weight: 700;
      }

      .meta .dot {
        width: 4px;
        height: 4px;
        background: #abb3b7;
        border-radius: 999px;
      }

      .card h2,
      .card h3 {
        margin: 0 0 16px;
        font-family: "Manrope", sans-serif;
        color: var(--on-surface);
      }

      .card p {
        margin: 0 0 20px;
        color: var(--on-surface-variant);
        line-height: 1.7;
      }

      .read-more {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: var(--tertiary);
        font-weight: 600;
      }

      .span-8 {
        grid-column: span 8;
      }

      .span-4 {
        grid-column: span 4;
      }

      .span-6 {
        grid-column: span 6;
      }

      .span-12 {
        grid-column: span 12;
      }

      .pagination {
        margin-top: 64px;
        display: flex;
        justify-content: center;
      }

      .pager {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px;
        border-radius: 999px;
        background: var(--surface-container-low);
      }

      .page-btn {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        border: none;
        background: transparent;
        color: var(--on-surface-variant);
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .page-btn.active {
        background: var(--on-surface);
        color: var(--surface);
      }

      .page-btn:hover {
        background: var(--surface-container-high);
      }

      footer {
        padding: 36px 0;
        background: var(--surface-container);
      }

      .footer-inner {
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 48px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .footer-links {
        display: flex;
        gap: 24px;
        font-size: 12px;
        color: var(--on-surface-variant);
      }

      @media (max-width: 960px) {
        .nav {
          padding: 0 24px;
        }

        .nav-links {
          display: none;
        }

        .container {
          width: min(100%, 92vw);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .span-8,
        .span-6,
        .span-4 {
          grid-column: span 1;
        }

        .card-body {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain-texture" aria-hidden="true"></div>
    <div class="page">
      <header>
        <nav class="nav">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true"></span>
            Zenithy
          </div>
          <div class="nav-links">
            <a href="https://zenithy.art">Projects</a>
            <a class="active" href="https://blog.zenithy.art">Blog</a>
            <a href="#">About</a>
          </div>
          <a class="nav-cta" href="https://blog.zenithy.art/admin/">进入后台</a>
        </nav>
      </header>

      <main>
        <div class="container">
          <section class="page-header">
            <h1>Insights &amp; Reflections</h1>
            <p>
              Reflections on computing, AI applications, and the craft of building reliable digital
              systems with clarity and intent.
            </p>
          </section>

          <section class="filters">
            <div id="tagFilters" class="tag-scroll"></div>
          </section>

          <section class="grid" id="postGrid"></section>

          <nav class="pagination">
            <div class="pager" id="pager"></div>
          </nav>
        </div>
      </main>

      <footer>
        <div class="footer-inner">
          <div>
            <div class="brand">
              <span class="brand-mark" aria-hidden="true"></span>
              Zenithy
            </div>
            <div style="font-size: 12px; color: var(--on-surface-variant)">
              © 2026 Zenithy Archive. All rights reserved.
            </div>
          </div>
          <div class="footer-links">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Contact</a>
          </div>
        </div>
      </footer>
    </div>
    <script>
      const grid = document.getElementById("postGrid");
      const pager = document.getElementById("pager");
      const tagFilters = document.getElementById("tagFilters");
      const manifestUrl = "./posts/manifest.json";

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toISOString().slice(0, 10);
      }

      function renderPosts(posts, pageSize, page, activeTag) {
        grid.innerHTML = "";
        const filtered = activeTag && activeTag !== "全部"
          ? posts.filter((post) => {
              const tags = Array.isArray(post.tags)
                ? post.tags
                : typeof post.tags === "string"
                  ? post.tags.split(",").map((t) => t.trim()).filter(Boolean)
                  : [];
              return tags.includes(activeTag);
            })
          : posts;

        if (!filtered.length) {
          grid.innerHTML = `
            <article class="card span-12" style="padding:32px;text-align:center;">
              <h3 style="margin:0 0 12px;font-family:Manrope, sans-serif;">暂无文章</h3>
              <p style="margin:0;color:#586064;">发布第一篇文章后，这里会自动排版展示。</p>
            </article>
          `;
          pager.innerHTML = "";
          return;
        }

        const start = (page - 1) * pageSize;
        const slice = filtered.slice(start, start + pageSize);

        slice.forEach((post, index) => {
          const isFeatured = page === 1 && index === 0;
          const spanClass = isFeatured ? "span-8" : index === 1 ? "span-4" : "span-6";
          const cover = post.cover || "";
          const readMore = post.url || "#";
          const tag = post.category || "Blog";
          const date = formatDate(post.date);
          const excerpt = post.excerpt || "";
          const title = post.title || "Untitled Post";
          const imgBlock = cover
            ? `<div style="aspect-ratio: ${isFeatured ? "16 / 8" : "4 / 3"}; overflow: hidden">
                <img src="${cover}" alt="${title}" />
              </div>`
            : "";

          grid.insertAdjacentHTML(
            "beforeend",
            `<article class="card ${spanClass}">
              ${imgBlock}
              <div class="card-body">
                <div class="meta">
                  <span class="tag">${tag}</span>
                  ${date ? `<span class="dot"></span><span>${date}</span>` : ""}
                </div>
                <h3>${title}</h3>
                <p>${excerpt}</p>
                <a class="read-more" href="${readMore}">
                  Read More
                  <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
                </a>
              </div>
            </article>`
          );
        });
      }

      function renderPager(total, pageSize, page, onChange) {
        pager.innerHTML = "";
        const pages = Math.max(1, Math.ceil(total / pageSize));
        const makeBtn = (label, p, isActive) => {
          const btn = document.createElement("button");
          btn.className = `page-btn${isActive ? " active" : ""}`;
          btn.textContent = label;
          btn.disabled = isActive;
          btn.addEventListener("click", () => onChange(p));
          return btn;
        };

        const prev = document.createElement("button");
        prev.className = "page-btn";
        prev.innerHTML = `<span class="material-symbols-outlined">chevron_left</span>`;
        prev.disabled = page === 1;
        prev.addEventListener("click", () => onChange(page - 1));
        pager.appendChild(prev);

        for (let i = 1; i <= pages; i++) {
          pager.appendChild(makeBtn(String(i), i, i === page));
        }

        const next = document.createElement("button");
        next.className = "page-btn";
        next.innerHTML = `<span class="material-symbols-outlined">chevron_right</span>`;
        next.disabled = page === pages;
        next.addEventListener("click", () => onChange(page + 1));
        pager.appendChild(next);
      }

      function renderTags(posts, activeTag, onSelect) {
        const tagSet = new Set();
        posts.forEach((post) => {
          const tags = Array.isArray(post.tags)
            ? post.tags
            : typeof post.tags === "string"
              ? post.tags.split(",").map((t) => t.trim()).filter(Boolean)
              : [];
          tags.forEach((t) => tagSet.add(t));
        });
        const tags = ["全部", ...Array.from(tagSet)];
        tagFilters.innerHTML = "";
        tags.forEach((tag) => {
          const btn = document.createElement("button");
          btn.className = `pill${tag === activeTag ? " active" : ""}`;
          btn.textContent = tag;
          btn.addEventListener("click", () => onSelect(tag));
          tagFilters.appendChild(btn);
        });
      }

      fetch(manifestUrl)
        .then((res) => res.json())
        .then((manifest) => {
          const pageSize = manifest.pageSize || 4;
          const posts = Array.isArray(manifest.posts) ? manifest.posts : [];
          let page = 1;
          let activeTag = "全部";
          const update = (p) => {
            page = p;
            renderPosts(posts, pageSize, page, activeTag);
            const total = activeTag === "全部"
              ? posts.length
              : posts.filter((post) => {
                  const tags = Array.isArray(post.tags)
                    ? post.tags
                    : typeof post.tags === "string"
                      ? post.tags.split(",").map((t) => t.trim()).filter(Boolean)
                      : [];
                  return tags.includes(activeTag);
                }).length;
            renderPager(total, pageSize, page, update);
          };
          renderTags(posts, activeTag, (tag) => {
            activeTag = tag;
            update(1);
            renderTags(posts, activeTag, (next) => {
              activeTag = next;
              update(1);
            });
          });
          update(1);
        })
        .catch(() => {
          renderPosts([], 4, 1, "全部");
        });
    </script>
  </body>
</html>
