<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenithy - 留言管理</title>
    <meta name="theme-color" content="#f8f9fa" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="alternate icon" href="../../favicon.svg" />
    <style>
      .messages-toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 22px;
      }

      .stat {
        padding: 20px;
      }

      .stat strong {
        display: block;
        font-size: 30px;
        letter-spacing: -0.06em;
      }

      .content {
        display: grid;
        grid-template-columns: minmax(360px, 0.85fr) minmax(360px, 1fr);
        gap: 18px;
      }

      .panel {
        min-height: 460px;
        padding: 18px;
      }

      .filter-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .filter {
        border: 1px solid var(--admin-line);
        border-radius: 999px;
        background: var(--admin-soft);
        color: var(--admin-muted);
        cursor: pointer;
        font-weight: 800;
        padding: 9px 12px;
      }

      .filter.active {
        background: var(--admin-ink);
        color: #fff;
      }

      .message-list {
        display: grid;
        gap: 10px;
      }

      .message-card {
        display: grid;
        width: 100%;
        gap: 8px;
        border: 1px solid var(--admin-line);
        border-radius: 22px;
        background: #fff;
        color: inherit;
        cursor: pointer;
        padding: 16px;
        text-align: left;
      }

      .message-card.active {
        border-color: rgba(8, 11, 11, 0.24);
        box-shadow: 0 12px 32px rgba(8, 11, 11, 0.08);
      }

      .message-card header,
      .detail-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        border-radius: 999px;
        background: var(--admin-soft);
        color: var(--admin-muted);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        padding: 0 9px;
        text-transform: uppercase;
      }

      .pill.unread {
        background: #e8f7f3;
        color: #006b55;
      }

      .pill.contacted {
        background: #e8f0fb;
        color: #285c9f;
      }

      .pill.archived {
        background: #efefef;
        color: #6d7477;
      }

      .message-preview,
      .empty,
      .help {
        color: var(--admin-muted);
        line-height: 1.7;
      }

      .detail {
        display: grid;
        gap: 18px;
      }

      .detail h2 {
        margin: 0;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
        letter-spacing: -0.06em;
      }

      .message-body {
        white-space: pre-wrap;
        border: 1px solid var(--admin-line);
        border-radius: 22px;
        background: #fff;
        line-height: 1.8;
        padding: 18px;
      }

      select {
        width: 220px;
        border: 1px solid var(--admin-line);
        border-radius: 999px;
        background: #fff;
        color: var(--admin-text);
        padding: 12px 14px;
      }

      .notice {
        margin-top: 18px;
        border: 1px solid rgba(8, 11, 11, 0.16);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--admin-text);
        padding: 14px 16px;
      }

      .notice.error {
        border-color: rgba(159, 64, 61, 0.2);
        background: rgba(159, 64, 61, 0.08);
        color: var(--admin-danger);
      }

      @media (max-width: 980px) {
        .content,
        .stats {
          grid-template-columns: 1fr;
        }

        .messages-toolbar {
          justify-content: flex-start;
        }
      }
    </style>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body class="admin-body">
    <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img class="admin-brand-mark" src="../../favicon.svg" alt="Zenithy" />
        <div>
          <strong>Zenithy</strong>
          <small>Blog Admin</small>
        </div>
      </div>
      <nav class="admin-nav" aria-label="后台导航">
        <a class="" href="https://blog.zenithy.art/admin/">文章列表</a>
        <a class="" href="https://blog.zenithy.art/admin/editor.html">发布文章</a>
        <a class="" href="https://blog.zenithy.art/admin/projects.html">项目管理</a>
        <a class="is-active" href="https://blog.zenithy.art/admin/messages.html">留言管理</a>
      </nav>
    </aside>

      <main class="admin-main">
        <div class="admin-page-head">
          <div>
            <p class="admin-eyebrow">Messages API</p>
            <h1 class="admin-page-title">留言管理</h1>
          </div>
          <div class="messages-toolbar">
            <button id="reloadBtn" class="button primary" type="button">刷新留言</button>
          </div>
        </div>

        <section class="stats" aria-label="留言统计">
          <div class="stat"><small class="eyebrow">Total</small><strong id="statTotal">0</strong></div>
          <div class="stat"><small class="eyebrow">Unread</small><strong id="statUnread">0</strong></div>
          <div class="stat"><small class="eyebrow">Contacted</small><strong id="statContacted">0</strong></div>
          <div class="stat"><small class="eyebrow">Archived</small><strong id="statArchived">0</strong></div>
        </section>

        <section class="content">
          <div class="panel">
            <div class="filter-row" role="tablist" aria-label="状态筛选">
              <button class="filter active" type="button" data-filter="all">全部</button>
              <button class="filter" type="button" data-filter="unread">未读</button>
              <button class="filter" type="button" data-filter="contacted">已联系</button>
              <button class="filter" type="button" data-filter="archived">已归档</button>
            </div>
            <div id="messageList" class="message-list"></div>
          </div>

          <div class="panel">
            <article id="messageDetail" class="detail">
              <p class="empty">点击“刷新留言”查看最新留言。</p>
            </article>
          </div>
        </section>

        <p id="notice" class="notice" hidden></p>
      </main>
    </div>

    <script>
      function apiBase() {
        if (window.ZENITHY_MESSAGES_API) return String(window.ZENITHY_MESSAGES_API).replace(/\/$/, "");
        if ((location.hostname === "127.0.0.1" || location.hostname === "localhost") && location.port === "8080") {
          return "http://127.0.0.1:18081/api";
        }
        return "/api";
      }

      const statusLabels = { unread: "未读", contacted: "已联系", archived: "已归档" };
      let messages = [];
      let currentFilter = "all";
      let selectedId = "";

      const listEl = document.getElementById("messageList");
      const detailEl = document.getElementById("messageDetail");
      const noticeEl = document.getElementById("notice");

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function showNotice(message, isError) {
        noticeEl.textContent = message;
        noticeEl.hidden = false;
        noticeEl.classList.toggle("error", Boolean(isError));
      }

      function api(path, options = {}) {
        const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
        return fetch(apiBase() + path, Object.assign({}, options, { headers, credentials: "same-origin" })).then((res) =>
          res.json().catch(() => ({})).then((payload) => {
            if (!res.ok || payload.ok === false) throw new Error(payload.error || "request_failed");
            return payload;
          })
        );
      }

      function formatTime(value) {
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? value || "未记录时间" : date.toLocaleString("zh-CN", { hour12: false });
      }

      function filteredMessages() {
        if (currentFilter === "all") return messages;
        return messages.filter((item) => item.status === currentFilter);
      }

      function updateStats() {
        document.getElementById("statTotal").textContent = messages.length;
        document.getElementById("statUnread").textContent = messages.filter((item) => item.status === "unread").length;
        document.getElementById("statContacted").textContent = messages.filter((item) => item.status === "contacted").length;
        document.getElementById("statArchived").textContent = messages.filter((item) => item.status === "archived").length;
      }

      function renderList() {
        const list = filteredMessages();
        if (!list.length) {
          listEl.innerHTML = '<p class="empty">暂无留言。</p>';
          return;
        }
        listEl.innerHTML = list
          .map((item) => {
            const active = item.id === selectedId ? " active" : "";
            const preview = String(item.message || "");
            return `
              <button class="message-card${active}" type="button" data-id="${escapeHtml(item.id)}">
                <header>
                  <strong>${escapeHtml(item.name || "未留姓名")}</strong>
                  <span class="pill ${escapeHtml(item.status)}">${escapeHtml(statusLabels[item.status] || item.status)}</span>
                </header>
                <span class="help">${escapeHtml(item.email)}</span>
                <p class="message-preview">${escapeHtml(preview).slice(0, 88)}${preview.length > 88 ? "..." : ""}</p>
                <small class="help">${escapeHtml(formatTime(item.createdAt))}</small>
              </button>
            `;
          })
          .join("");
      }

      function renderDetail() {
        const item = messages.find((message) => message.id === selectedId);
        if (!item) {
          detailEl.innerHTML = '<p class="empty">请选择一条留言查看详情。</p>';
          return;
        }
        detailEl.innerHTML = `
          <div class="detail-meta">
            <span class="pill ${escapeHtml(item.status)}">${escapeHtml(statusLabels[item.status] || item.status)}</span>
            <small class="help">${escapeHtml(item.id)}</small>
          </div>
          <h2>${escapeHtml(item.name || "未留姓名")}</h2>
          <p><a href="mailto:${escapeHtml(item.email)}">${escapeHtml(item.email)}</a></p>
          <div class="message-body">${escapeHtml(item.message)}</div>
          <select id="statusSelect">
            <option value="unread"${item.status === "unread" ? " selected" : ""}>未读</option>
            <option value="contacted"${item.status === "contacted" ? " selected" : ""}>已联系</option>
            <option value="archived"${item.status === "archived" ? " selected" : ""}>已归档</option>
          </select>
          <p class="help">来源：${escapeHtml(item.source || "zenithy-home")} · 创建：${escapeHtml(formatTime(item.createdAt))}</p>
          <div class="toolbar" style="justify-content:flex-start">
            <button class="button danger" type="button" id="deleteSelected">删除该留言</button>
          </div>
        `;
      }

      function render() {
        updateStats();
        renderList();
        renderDetail();
      }

      function loadMessages() {
        api("/admin/messages")
          .then((data) => {
            messages = Array.isArray(data.messages) ? data.messages : [];
            selectedId = messages[0] ? messages[0].id : "";
            render();
            showNotice("留言已刷新。");
          })
          .catch((error) => showNotice("读取失败：" + error.message + "。请确认已通过博客后台账号密码登录，并确认 HireMate/Caddyfile 已把 /api/admin/messages* 反代到 portal-messages-api。", true));
      }

      document.getElementById("reloadBtn").addEventListener("click", loadMessages);

      document.querySelectorAll(".filter").forEach((button) => {
        button.addEventListener("click", () => {
          currentFilter = button.dataset.filter || "all";
          document.querySelectorAll(".filter").forEach((item) => item.classList.toggle("active", item === button));
          render();
        });
      });

      listEl.addEventListener("click", (event) => {
        const card = event.target.closest(".message-card");
        if (!card) return;
        selectedId = card.dataset.id;
        render();
      });

      detailEl.addEventListener("change", (event) => {
        if (event.target.id !== "statusSelect") return;
        const status = event.target.value;
        api("/admin/messages/" + encodeURIComponent(selectedId), {
          method: "PATCH",
          body: JSON.stringify({ status }),
        })
          .then((data) => {
            const next = data.message;
            messages = messages.map((item) => (item.id === next.id ? next : item));
            render();
            showNotice("状态已更新。");
          })
          .catch((error) => showNotice("更新失败：" + error.message, true));
      });

      detailEl.addEventListener("click", (event) => {
        if (event.target.id !== "deleteSelected") return;
        const ok = confirm("确认删除这条留言？如果只是暂时处理完，建议改为“已归档”。");
        if (!ok) return;
        api("/admin/messages/" + encodeURIComponent(selectedId), { method: "DELETE" })
          .then(() => {
            messages = messages.filter((item) => item.id !== selectedId);
            selectedId = messages[0] ? messages[0].id : "";
            render();
            showNotice("留言已删除。");
          })
          .catch((error) => showNotice("删除失败：" + error.message, true));
      });

      render();
      loadMessages();
    </script>
  </body>
</html>
