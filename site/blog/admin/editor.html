    <script>
      const storageKey = "zenithy_blog_draft_v1";
      const manifestUrl = "../posts/manifest.json";
      const editorBaseUrl = "https://blog.zenithy.art/admin/editor.html";
      const params = new URLSearchParams(window.location.search);
      const editingSlug = String(params.get("slug") || params.get("edit") || "").trim();
      const editorPageTitle = document.getElementById("editorPageTitle");
      const editorModeHint = document.getElementById("editorModeHint");
      const titleInput = document.getElementById("titleInput");
      const subtitleInput = document.getElementById("subtitleInput");
      const bodyInput = document.getElementById("bodyInput");
      const slugInput = document.getElementById("slugInput");
      const categoryInput = document.getElementById("categoryInput");
      const tagsInput = document.getElementById("tagsInput");
      const seoInput = document.getElementById("seoInput");
      const coverInput = document.getElementById("coverInput");
      const coverBox = document.getElementById("coverBox");
      const saveDraftBtn = document.getElementById("saveDraft");
      const publishBtn = document.getElementById("publishBtn");
      const formatBoldBtn = document.getElementById("formatBoldBtn");
      const formatItalicBtn = document.getElementById("formatItalicBtn");
      const insertLinkBtn = document.getElementById("insertLinkBtn");
      const insertImageShortcutBtn = document.getElementById("insertImageShortcutBtn");
      const bodyImageUrl = document.getElementById("bodyImageUrl");
      const bodyImageFile = document.getElementById("bodyImageFile");
      const bodyImageAlt = document.getElementById("bodyImageAlt");
      const bodyImageCaption = document.getElementById("bodyImageCaption");
      const bodyImageLayout = document.getElementById("bodyImageLayout");
      const insertImageBtn = document.getElementById("insertImageBtn");
      const resetMediaFieldsBtn = document.getElementById("resetMediaFields");
      const mediaSelectionHint = document.getElementById("mediaSelectionHint");

      let coverData = "";
      let slugTouched = false;
      let editingPost = null;
      let currentManifest = null;
      let savedBodyRange = null;
      let selectedMediaBlock = null;

      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/[^\w\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .slice(0, 60);
      }

      function currentStorageKey() {
        return editingSlug ? storageKey + "_edit_" + editingSlug : storageKey;
      }

      function setEditorMode(mode, post) {
        const isEditMode = mode === "edit";
        const slug = String((post && post.slug) || editingSlug || "").trim();

        document.title = isEditMode ? "Zenithy - 编辑文章" : "Zenithy - 发布文章";
        editorPageTitle.textContent = isEditMode ? "编辑文章" : "发布文章";
        publishBtn.textContent = isEditMode ? "更新发布" : "发布";
        saveDraftBtn.title = isEditMode ? "保存编辑草稿" : "保存草稿";

        if (editorModeHint) {
          editorModeHint.textContent = isEditMode
            ? "当前正在编辑已发布文章：" + slug + "。本次导出会覆盖 /portal/site/blog/posts/" + slug + "/index.html，并更新同一条 manifest 记录。"
            : "当前为新建模式，发布后会生成新的文章文件与 manifest 更新包。";
        }
      }

      function editorUrl(slug) {
        return slug ? editorBaseUrl + "?slug=" + encodeURIComponent(slug) : editorBaseUrl;
      }

      function postUrl(slug) {
        return `https://blog.zenithy.art/posts/${slug}/`;
      }

      function postFileUrl(slug) {
        return "../posts/" + encodeURIComponent(slug) + "/index.html";
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function setCoverPreview(src) {
        coverData = src || "";
        if (coverData) {
          coverBox.style.backgroundImage = `url(${coverData})`;
          coverBox.style.backgroundSize = "cover";
          coverBox.style.backgroundPosition = "center";
        } else {
          coverBox.style.backgroundImage = "";
          coverBox.style.backgroundSize = "";
          coverBox.style.backgroundPosition = "";
        }
      }

      function setCategoryValue(value) {
        const category = value || "Uncategorized";
        const options = Array.from(categoryInput.options).map((option) => option.value);
        if (!options.includes(category)) {
          categoryInput.add(new Option(category, category));
        }
        categoryInput.value = category;
      }

      function isRangeInsideBody(range) {
        if (!range) return false;
        try {
          return bodyInput.contains(range.commonAncestorContainer);
        } catch (error) {
          return false;
        }
      }

      function saveBodySelection() {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) return false;
        const range = selection.getRangeAt(0);
        if (!isRangeInsideBody(range)) return false;
        savedBodyRange = range.cloneRange();
        return true;
      }

      function restoreBodySelection() {
        if (!savedBodyRange) return false;
        const selection = window.getSelection();
        if (!selection) return false;
        try {
          selection.removeAllRanges();
          selection.addRange(savedBodyRange.cloneRange());
          return true;
        } catch (error) {
          return false;
        }
      }

      function ensureBodyFocusAtEnd() {
        bodyInput.focus();
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(bodyInput);
        range.collapse(false);
        selection.removeAllRanges();
        selection.addRange(range);
        savedBodyRange = range.cloneRange();
      }

      function resetBodyImageFields(options = {}) {
        const keepLayout = options.keepLayout === true;
        bodyImageUrl.value = "";
        bodyImageFile.value = "";
        bodyImageAlt.value = "";
        bodyImageCaption.value = "";
        if (!keepLayout) {
          bodyImageLayout.value = "wide";
        }
      }

      function getMediaLayoutFromBlock(block) {
        if (!block) return "wide";
        if (block.classList.contains("article-media--center")) return "center";
        if (block.classList.contains("article-media--left")) return "left";
        if (block.classList.contains("article-media--right")) return "right";
        return "wide";
      }

      function setSelectedMediaBlock(block) {
        if (selectedMediaBlock && selectedMediaBlock !== block) {
          selectedMediaBlock.classList.remove("is-selected");
        }
        selectedMediaBlock = block || null;

        if (!selectedMediaBlock) {
          if (mediaSelectionHint) {
            mediaSelectionHint.textContent = "在当前光标位置插入图片，并选择宽幅、居中、左对齐或右对齐版式。";
          }
          insertImageBtn.textContent = "插入正文图片";
          return;
        }

        selectedMediaBlock.classList.add("is-selected");
        const image = selectedMediaBlock.querySelector("img");
        const caption = selectedMediaBlock.querySelector("figcaption");
        bodyImageUrl.value = image ? image.getAttribute("src") || "" : "";
        bodyImageAlt.value = image ? image.getAttribute("alt") || "" : "";
        bodyImageCaption.value = caption ? caption.textContent.trim() : "";
        bodyImageLayout.value = getMediaLayoutFromBlock(selectedMediaBlock);
        bodyImageFile.value = "";
        if (mediaSelectionHint) {
          mediaSelectionHint.textContent = "已选中正文中的图片模块。修改右侧字段后点击按钮，会直接更新当前图片。";
        }
        insertImageBtn.textContent = "更新当前图片";
      }

      function clearSelectedMediaBlock() {
        if (selectedMediaBlock) {
          selectedMediaBlock.classList.remove("is-selected");
        }
        selectedMediaBlock = null;
        if (mediaSelectionHint) {
          mediaSelectionHint.textContent = "在当前光标位置插入图片，并选择宽幅、居中、左对齐或右对齐版式。";
        }
        insertImageBtn.textContent = "插入正文图片";
      }

      function updateMediaBlock(block, options) {
        if (!block) return;
        const src = escapeHtml(options.src);
        const alt = escapeHtml(options.alt || options.caption || "Article image");
        const layout = normaliseImageLayout(options.layout);
        const caption = String(options.caption || "").trim();
        const image = block.querySelector("img") || document.createElement("img");
        let captionNode = block.querySelector("figcaption");

        image.setAttribute("src", src);
        image.setAttribute("alt", alt);
        image.setAttribute("loading", "lazy");
        if (!image.parentNode) {
          block.appendChild(image);
        }

        block.className = `article-media article-media--${layout}`;

        if (caption) {
          if (!captionNode) {
            captionNode = document.createElement("figcaption");
            block.appendChild(captionNode);
          }
          captionNode.textContent = caption;
        } else if (captionNode) {
          captionNode.remove();
        }
      }

      function readFileAsDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(String(reader.result || ""));
          reader.onerror = () => reject(new Error("image-read-failed"));
          reader.readAsDataURL(file);
        });
      }

      function normaliseImageLayout(value) {
        const allowed = new Set(["wide", "center", "left", "right"]);
        return allowed.has(value) ? value : "wide";
      }

      function buildArticleImageHtml(options) {
        const src = escapeHtml(options.src);
        const alt = escapeHtml(options.alt || options.caption || "Article image");
        const layout = normaliseImageLayout(options.layout);
        const caption = String(options.caption || "").trim();
        const captionHtml = caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : "";
        return `<figure class="article-media article-media--${layout}"><img src="${src}" alt="${alt}" loading="lazy" />${captionHtml}</figure><p><br></p>`;
      }

      function insertHtmlAtSelection(html) {
        bodyInput.focus();
        const selection = window.getSelection();
        if (!restoreBodySelection()) {
          ensureBodyFocusAtEnd();
        }
        if (!selection.rangeCount) {
          ensureBodyFocusAtEnd();
        }
        const range = selection.getRangeAt(0);
        range.deleteContents();
        const template = document.createElement("template");
        template.innerHTML = html.trim();
        const fragment = template.content;
        const lastNode = fragment.lastChild;
        range.insertNode(fragment);
        if (lastNode) {
          const nextRange = document.createRange();
          nextRange.setStartAfter(lastNode);
          nextRange.collapse(true);
          selection.removeAllRanges();
          selection.addRange(nextRange);
          savedBodyRange = nextRange.cloneRange();
        }
        bodyInput.dispatchEvent(new Event("input", { bubbles: true }));
      }

      function applyEditorCommand(command, value) {
        bodyInput.focus();
        restoreBodySelection();
        document.execCommand(command, false, value || null);
        saveBodySelection();
      }

      async function insertBodyImage() {
        const file = bodyImageFile.files && bodyImageFile.files[0];
        const rawUrl = String(bodyImageUrl.value || "").trim();
        const src = file ? await readFileAsDataUrl(file) : rawUrl;

        if (!src) {
          alert("请先选择图片地址或上传图片，再插入正文。");
          return;
        }

        const html = buildArticleImageHtml({
          src,
          alt: bodyImageAlt.value,
          caption: bodyImageCaption.value,
          layout: bodyImageLayout.value,
        });

        if (selectedMediaBlock) {
          updateMediaBlock(selectedMediaBlock, {
            src,
            alt: bodyImageAlt.value,
            caption: bodyImageCaption.value,
            layout: bodyImageLayout.value,
          });
          bodyInput.dispatchEvent(new Event("input", { bubbles: true }));
          resetBodyImageFields({ keepLayout: true });
          setSelectedMediaBlock(selectedMediaBlock);
          return;
        }

        insertHtmlAtSelection(html);
        resetBodyImageFields({ keepLayout: true });
      }

      titleInput.addEventListener("input", () => {
        if (!slugTouched) {
          slugInput.value = slugify(titleInput.value || "new-blog-post");
        }
      });

      slugInput.addEventListener("input", () => {
        slugTouched = true;
      });

      coverInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          setCoverPreview(reader.result);
        };
        reader.readAsDataURL(file);
      });

      ["mouseup", "keyup", "focus", "input"].forEach((eventName) => {
        bodyInput.addEventListener(eventName, saveBodySelection);
      });

      bodyInput.addEventListener("click", (event) => {
        const mediaBlock = event.target.closest(".article-media");
        if (mediaBlock && bodyInput.contains(mediaBlock)) {
          setSelectedMediaBlock(mediaBlock);
          return;
        }
        clearSelectedMediaBlock();
      });

      document.addEventListener("selectionchange", () => {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) return;
        const range = selection.getRangeAt(0);
        if (isRangeInsideBody(range)) {
          savedBodyRange = range.cloneRange();
        }
      });

      function estimateReadTime(html) {
        const text = html.replace(/<[^>]*>/g, " ").replace(/\s+/g, " ").trim();
        const words = text ? text.split(" ").length : 0;
        const minutes = Math.max(1, Math.ceil(words / 200));
        return `${minutes} min read`;
      }

      function collectDraft() {
        const tagList = tagsInput.value
          .split(",")
          .map((t) => t.trim())
          .filter(Boolean);
        return {
          title: titleInput.value,
          subtitle: subtitleInput.value,
          body: bodyInput.innerHTML,
          slug: slugInput.value,
          category: categoryInput.value,
          tags: tagList,
          seo: seoInput.value,
          cover: coverData,
          updatedAt: new Date().toISOString(),
        };
      }

      function saveDraft() {
        localStorage.setItem(currentStorageKey(), JSON.stringify(collectDraft()));
        alert(editingSlug ? "已保存当前文章的本地编辑草稿。" : "已保存本地草稿。");
      }

      function loadDraft() {
        const raw = localStorage.getItem(currentStorageKey());
        if (!raw) return;
        try {
          const draft = JSON.parse(raw);
          titleInput.value = draft.title || "";
          subtitleInput.value = draft.subtitle || "";
          bodyInput.innerHTML = draft.body || "";
          slugInput.value = draft.slug || "";
          setCategoryValue(draft.category || "Uncategorized");
          tagsInput.value = Array.isArray(draft.tags) ? draft.tags.join(", ") : (draft.tags || "");
          seoInput.value = draft.seo || "";
          setCoverPreview(draft.cover || "");
          setEditorMode(editingSlug ? "edit" : "create", draft);
          clearSelectedMediaBlock();
        } catch (err) {
          console.warn("Failed to load draft", err);
        }
      }

      function hydrateFromPost(post) {
        editingPost = post || null;
        setEditorMode(editingSlug ? "edit" : "create", post);
        titleInput.value = (post && post.title) || "";
        subtitleInput.value = (post && (post.excerpt || post.subtitle)) || "";
        slugInput.value = (post && post.slug) || "";
        slugTouched = true;
        if (editingSlug) {
          slugInput.readOnly = true;
          slugInput.classList.add("opacity-70", "cursor-not-allowed");
          slugInput.title = "编辑已发布文章时固定原 slug；如需改路径，请新建文章并同步迁移目录。";
        }
        setCategoryValue((post && post.category) || "Uncategorized");
        tagsInput.value = Array.isArray(post && post.tags) ? post.tags.join(", ") : ((post && post.tags) || "");
        seoInput.value = (post && (post.seo || post.description)) || "";
        setCoverPreview((post && post.cover) || "");
        clearSelectedMediaBlock();
      }

      function parseExistingPostHtml(html, fallbackPost) {
        const doc = new DOMParser().parseFromString(html, "text/html");
        const title = doc.querySelector("h1");
        const subtitle = doc.querySelector(".subtitle");
        const article = doc.querySelector("article.article");
        const description = doc.querySelector('meta[name="description"]');
        const cover = doc.querySelector(".feature img");

        titleInput.value = (title && title.textContent.trim()) || titleInput.value;
        subtitleInput.value = (subtitle && subtitle.textContent.trim()) || subtitleInput.value;
        if (article) bodyInput.innerHTML = article.innerHTML.trim();
        if (description && description.getAttribute("content")) {
          seoInput.value = description.getAttribute("content");
        }
        if (cover && cover.getAttribute("src")) {
          setCoverPreview(cover.getAttribute("src"));
        } else if (fallbackPost && fallbackPost.cover) {
          setCoverPreview(fallbackPost.cover);
        }
      }

      function loadPublishedPost(slug) {
        if (!slug) {
          loadDraft();
          return;
        }

        slugInput.value = slug;
        slugTouched = true;

        fetch(manifestRequest(manifestUrl), { cache: "no-store" })
          .then((res) => {
            if (!res.ok) throw new Error("manifest request failed");
            return res.json();
          })
          .then((manifest) => {
            currentManifest = manifest;
            const posts = Array.isArray(manifest.posts) ? manifest.posts : [];
            const post = posts.find((item) => item.slug === slug);
            if (!post) throw new Error("post not found in manifest");
            hydrateFromPost(post);
            return fetch(manifestRequest(postFileUrl(slug)), { cache: "no-store" })
              .then((res) => {
                if (!res.ok) throw new Error("post html request failed");
                return res.text();
              })
              .then((html) => parseExistingPostHtml(html, post))
              .catch((err) => {
                console.warn("Loaded manifest metadata but failed to load post HTML", err);
              });
          })
          .catch((err) => {
            console.error("Failed to load published post", err);
            alert("读取已发布文章失败：请确认 manifest.json 中存在该 slug，且 /blog/posts/" + slug + "/index.html 可访问。");
          });
      }

      function generateHtml() {
        const draft = collectDraft();
        const coverHtml = draft.cover
          ? `<div class="feature"><img src="${escapeHtml(draft.cover)}" alt="Cover image" /></div>`
          : "";
        return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${escapeHtml(draft.title || "Zenithy Blog Post")}</title>
  <meta name="description" content="${escapeHtml(draft.seo || "")}" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@300..700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:Inter, sans-serif;margin:0;background:#f8f9fa;color:#2b3437;}
    .container{width:min(800px,92vw);margin:0 auto;padding:64px 0;}
    h1{font-family:Manrope,sans-serif;font-size:clamp(32px,4vw,56px);margin:0 0 12px;}
    h2{font-family:Manrope,sans-serif;}
    .subtitle{font-size:20px;color:#586064;margin-bottom:28px;}
    .feature{width:min(1200px,92vw);margin:0 auto 48px;border-radius:24px;overflow:hidden;background:#f1f4f6;}
    .feature img{width:100%;display:block;object-fit:cover;}
    .article{font-size:18px;}
    .article p{line-height:1.8;color:#586064;font-size:18px;margin-bottom:24px;}
    .article figure{margin:40px 0;}
    .article img{display:block;max-width:100%;}
    .article .article-media img{width:100%;border-radius:24px;background:#f1f4f6;}
    .article .article-media figcaption{margin-top:12px;font-size:14px;line-height:1.6;color:#586064;text-align:center;}
    .article .article-media--wide{width:100%;}
    .article .article-media--center{width:min(78%,640px);margin:40px auto;}
    .article .article-media--left{width:min(68%,520px);margin:40px auto 40px 0;}
    .article .article-media--right{width:min(68%,520px);margin:40px 0 40px auto;}
    @media (max-width:760px){
      .article .article-media--center,
      .article .article-media--left,
      .article .article-media--right{width:100%;margin-left:0;margin-right:0;}
    }
  </style>
</head>
<body>
  ${coverHtml}
  <div class="container">
    <h1>${escapeHtml(draft.title || "")}</h1>
    <div class="subtitle">${escapeHtml(draft.subtitle || "")}</div>
    <article class="article">${draft.body || ""}</article>
  </div>
</body>
</html>`;
      }

      function downloadFile(filename, content, type = "text/html") {
        const blob = new Blob([content], { type });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      function manifestRequest(url) {
        const marker = url.includes("?") ? "&" : "?";
        return url + marker + "v=" + Date.now();
      }

      function buildUpdatedManifest(manifest, entry, slug) {
        const source = manifest && typeof manifest === "object" ? manifest : currentManifest;
        const posts = Array.isArray(source && source.posts) ? source.posts : [];
        const withoutCurrent = posts.filter((post) => post.slug !== slug);
        return {
          pageSize: (source && source.pageSize) || 4,
          posts: [entry, ...withoutCurrent],
        };
      }

      formatBoldBtn.addEventListener("click", () => applyEditorCommand("bold"));
      formatItalicBtn.addEventListener("click", () => applyEditorCommand("italic"));
      insertLinkBtn.addEventListener("click", () => {
        const url = window.prompt("请输入链接地址", "https://");
        if (!url) return;
        applyEditorCommand("createLink", url.trim());
      });
      insertImageShortcutBtn.addEventListener("click", () => {
        bodyImageUrl.scrollIntoView({ behavior: "smooth", block: "center" });
        bodyImageUrl.focus();
      });
      insertImageBtn.addEventListener("click", () => {
        insertBodyImage().catch((error) => {
          console.error("Failed to insert body image", error);
          alert("插入图片失败，请检查图片地址或重新选择文件后再试。");
        });
      });
      resetMediaFieldsBtn.addEventListener("click", () => {
        resetBodyImageFields();
        clearSelectedMediaBlock();
      });

      document.getElementById("saveDraft").addEventListener("click", saveDraft);
      const previewModal = document.getElementById("previewModal");
      const previewFrame = document.getElementById("previewFrame");
      const closePreview = document.getElementById("closePreview");

      function openPreview() {
        const html = generateHtml();
        const blob = new Blob([html], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        previewFrame.src = url;
        previewModal.classList.remove("hidden");
        previewModal.classList.add("flex");
        previewModal.dataset.url = url;
      }

      function closePreviewModal() {
        const url = previewModal.dataset.url;
        if (url) {
          URL.revokeObjectURL(url);
        }
        previewFrame.src = "about:blank";
        previewModal.classList.add("hidden");
        previewModal.classList.remove("flex");
      }

      document.getElementById("previewBtn").addEventListener("click", openPreview);
      document.getElementById("previewText").addEventListener("click", openPreview);
      closePreview.addEventListener("click", closePreviewModal);
      publishBtn.addEventListener("click", () => {
        const draft = collectDraft();
        const slug = slugify(draft.slug || draft.title || "new-post") || "new-post";
        slugInput.value = slug;
        const html = generateHtml();
        const now = new Date().toISOString();
        const existing = editingPost && editingPost.slug === slug ? editingPost : null;
        const entry = Object.assign({}, existing || {}, {
          title: draft.title || "Untitled Post",
          excerpt: draft.subtitle || "",
          subtitle: draft.subtitle || "",
          date: (existing && existing.date) || now,
          updatedAt: now,
          category: draft.category || "Blog",
          tags: draft.tags,
          cover: draft.cover || "",
          readTime: estimateReadTime(draft.body || ""),
          status: "已发布",
          published: true,
          slug: slug,
          url: postUrl(slug),
          adminEdit: editorUrl(slug),
        });

        downloadFile("index.html", html);

        fetch(manifestRequest(manifestUrl), { cache: "no-store" })
          .then((res) => {
            if (!res.ok) throw new Error("manifest request failed");
            return res.json();
          })
          .then((manifest) => {
            const updated = buildUpdatedManifest(manifest, entry, slug);
            downloadFile("manifest.json", JSON.stringify(updated, null, 2), "application/json");
          })
          .catch(() => {
            const fallback = buildUpdatedManifest(currentManifest, entry, slug);
            downloadFile(
              "manifest.json",
              JSON.stringify(fallback, null, 2),
              "application/json"
            );
          });

        alert(
          (editingSlug
            ? "已生成更新后的 index.html 和 manifest.json。请用新的 index.html 覆盖 /portal/site/blog/posts/"
            : "已生成 index.html 和 manifest.json。请把 index.html 放入 /portal/site/blog/posts/") +
            slug +
            "/index.html，并用新的 manifest.json 替换 /portal/site/blog/posts/manifest.json，然后在本地 Git 提交并部署。这样云端不会出现未提交文件，避免 git pull 冲突。"
        );
      });
      document.getElementById("clearDraft").addEventListener("click", () => {
        localStorage.removeItem(currentStorageKey());
        alert(editingSlug ? "已清除当前文章的本地编辑草稿。" : "已清除本地草稿。");
      });

      if (editingSlug) {
        loadPublishedPost(editingSlug);
      } else {
        setEditorMode("create");
        loadDraft();
      }
    </script>
  </body>
</html>
