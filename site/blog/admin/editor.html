<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zenithy - Blog Editor</title>
    <meta name="theme-color" content="#f8f9fa" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="alternate icon" href="../../favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;family=Inter:wght@300..700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f8f9fa",
              "on-secondary-fixed-variant": "#515d65",
              "inverse-surface": "#0c0f10",
              "on-tertiary-fixed": "#003a47",
              "on-primary": "#f7f7fa",
              "secondary-fixed": "#d8e4ee",
              "surface-dim": "#d1dce0",
              "surface-container-highest": "#dbe4e7",
              "on-surface-variant": "#586064",
              "outline": "#737c7f",
              "on-primary-fixed": "#3e3f42",
              "on-secondary-fixed": "#354148",
              "inverse-primary": "#f9f9fc",
              "on-error": "#fff7f6",
              "on-tertiary": "#f1faff",
              "error-dim": "#4e0309",
              "tertiary-container": "#91dcf6",
              "primary-container": "#e2e2e5",
              "tertiary-fixed": "#91dcf6",
              "surface-tint": "#5d5e61",
              "background": "#f8f9fa",
              "error-container": "#fe8983",
              "tertiary": "#03687e",
              "on-secondary": "#f4faff",
              "surface-container-lowest": "#ffffff",
              "surface": "#f8f9fa",
              "on-error-container": "#752121",
              "secondary": "#556169",
              "secondary-fixed-dim": "#cad6e0",
              "on-tertiary-container": "#004e60",
              "on-primary-fixed-variant": "#5a5c5e",
              "primary-fixed-dim": "#d4d4d7",
              "surface-container": "#eaeff1",
              "on-primary-container": "#505254",
              "surface-container-low": "#f1f4f6",
              "tertiary-dim": "#005b6f",
              "inverse-on-surface": "#9b9d9e",
              "secondary-container": "#d8e4ee",
              "secondary-dim": "#49555d",
              "outline-variant": "#abb3b7",
              "on-secondary-container": "#47535b",
              "primary": "#5d5e61",
              "surface-variant": "#dbe4e7",
              "on-surface": "#2b3437",
              "surface-container-high": "#e3e9ec",
              "error": "#9f403d",
              "on-tertiary-fixed-variant": "#00586c",
              "primary-dim": "#515255",
              "primary-fixed": "#e2e2e5",
              "on-background": "#2b3437",
              "tertiary-fixed-dim": "#83cee7",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-manrope {
        font-family: "Manrope", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .brand-mark {
        display: inline-flex;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #2b3437;
        position: relative;
      }
      .brand-mark::after {
        content: "";
        position: absolute;
        inset: 4px;
        border-radius: 50%;
        background: #fff;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1dce0;
        border-radius: 10px;
      }
      .editor-prose p {
        margin-bottom: 1.5rem;
        line-height: 1.8;
      }
      .editor-prose h2 {
        margin-top: 2.5rem;
        margin-bottom: 1rem;
        font-size: 1.6rem;
        font-weight: 700;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface flex h-screen overflow-hidden">
    <aside
      class="hidden md:flex h-full py-8 h-screen w-64 bg-slate-50 font-manrope text-sm tracking-tight shrink-0"
    >
      <div class="px-6 mb-10">
        <div class="flex items-center gap-2">
          <span class="brand-mark" aria-hidden="true"></span>
          <h1 class="text-lg font-bold text-slate-900">Zenithy Slate</h1>
        </div>
        <p class="text-slate-500 text-xs">Editor Workspace</p>
      </div>
      <nav class="flex-1 space-y-1">
        <a
          class="flex items-center gap-3 px-6 py-3 text-teal-700 font-semibold bg-slate-200/50 rounded-r-full"
          href="https://blog.zenithy.art/admin/"
        >
          <span class="material-symbols-outlined">edit_note</span>
          <span>Posts</span>
        </a>
        <a class="flex items-center gap-3 px-6 py-3 text-slate-500" href="#">
          <span class="material-symbols-outlined">category</span>
          <span>Categories</span>
        </a>
        <a class="flex items-center gap-3 px-6 py-3 text-slate-500" href="#">
          <span class="material-symbols-outlined">perm_media</span>
          <span>Media</span>
        </a>
        <a class="flex items-center gap-3 px-6 py-3 text-slate-500" href="#">
          <span class="material-symbols-outlined">settings</span>
          <span>Settings</span>
        </a>
      </nav>
      <div class="px-6 mt-auto">
        <div class="flex items-center gap-3 p-2 rounded-lg hover:bg-slate-200/30">
          <img
            alt="User profile"
            class="w-8 h-8 rounded-full object-cover"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJLBiHTBOmvJ7HC5Ho2CobFzUeBjzol1g-m1sndxfJRYmHwdoAebogU10KLUSIHfaI7b2FG8741Qnis-FvR8iqXy2T7_pQLgmeDHrH4p_r9WIo6O_TMD0HYymt9WIAMdxLjDn7W2r6AcsdRXkUE6A91pungzR2xm7eEyzCvgqogmTJIddDhoXseazHndicgALdngqkP5KQwP6MIPaAzdDmz46YKqmKq8hRvErLE0_wmD8s50l2zhLmk9hAfeFnGcYYcoo2bGIk5lGg"
          />
          <div class="overflow-hidden">
            <p class="font-bold text-slate-900 truncate">Zenithy Admin</p>
            <p class="text-[10px] text-slate-500">Content Manager</p>
          </div>
        </div>
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 bg-surface">
      <header
        class="flex justify-between items-center h-16 w-full px-8 border-b border-slate-100 bg-white/80 backdrop-blur-xl shadow-sm font-manrope text-sm font-medium sticky top-0 z-10"
      >
        <div class="flex items-center gap-6">
          <span class="text-xl font-black text-slate-900">Zenithy Editor</span>
          <nav class="hidden lg:flex gap-6 items-center">
            <a class="text-slate-500 hover:text-teal-600" href="#">Drafts</a>
            <a class="text-slate-500 hover:text-teal-600" href="#">Published</a>
            <a class="text-slate-500 hover:text-teal-600" href="#">Scheduled</a>
          </nav>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center mr-4 border-r border-slate-200 pr-4 gap-2">
            <button
              id="saveDraft"
              class="p-2 text-slate-500 hover:text-teal-600 hover:bg-slate-100 rounded-full"
              title="Save draft"
            >
              <span class="material-symbols-outlined">save</span>
            </button>
            <button
              id="previewBtn"
              class="p-2 text-slate-500 hover:text-teal-600 hover:bg-slate-100 rounded-full"
              title="Preview"
            >
              <span class="material-symbols-outlined">visibility</span>
            </button>
            <button class="p-2 text-slate-500 hover:text-teal-600 hover:bg-slate-100 rounded-full">
              <span class="material-symbols-outlined">more_vert</span>
            </button>
          </div>
          <button id="previewText" class="px-5 py-2 text-slate-600 hover:text-teal-800 font-semibold">
            Preview
          </button>
          <button
            id="publishBtn"
            class="px-6 py-2 bg-tertiary text-on-tertiary rounded-full font-bold hover:bg-tertiary-dim shadow-lg shadow-tertiary/10"
          >
            Publish
          </button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto flex">
        <div class="flex-1 max-w-4xl mx-auto px-8 py-12">
          <label
            class="w-full h-80 rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant/30 flex flex-col items-center justify-center group cursor-pointer hover:bg-surface-container transition-all mb-12"
            for="coverInput"
            id="coverBox"
          >
            <div
              class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant group-hover:scale-110 transition-transform"
            >
              <span class="material-symbols-outlined text-3xl">add_photo_alternate</span>
            </div>
            <p class="mt-4 font-manrope font-semibold text-on-surface-variant">Add Cover Image</p>
            <p class="text-xs text-outline mt-1">1600 x 900px recommended</p>
            <input id="coverInput" type="file" accept="image/*" class="hidden" />
          </label>

          <div class="space-y-6">
            <input
              id="titleInput"
              class="w-full bg-transparent border-none p-0 text-5xl font-extrabold font-manrope placeholder:text-surface-dim focus:ring-0 text-on-surface"
              placeholder="Enter your title..."
              type="text"
            />
            <input
              id="subtitleInput"
              class="w-full bg-transparent border-none p-0 text-xl font-medium text-on-surface-variant placeholder:text-surface-dim focus:ring-0"
              placeholder="Add a subtitle or excerpt to hook your readers..."
              type="text"
            />

            <div class="relative pt-8 group">
              <div
                class="absolute -top-4 left-0 right-0 flex justify-center opacity-0 group-focus-within:opacity-100 transition-opacity pointer-events-none"
              >
                <div
                  class="bg-surface-container-lowest shadow-xl rounded-full border border-outline-variant/10 px-4 py-2 flex items-center gap-1 pointer-events-auto backdrop-blur-md bg-white/90"
                >
                  <button class="p-2 hover:bg-surface-container-low rounded-full text-on-surface-variant">
                    <span class="material-symbols-outlined text-xl">format_bold</span>
                  </button>
                  <button class="p-2 hover:bg-surface-container-low rounded-full text-on-surface-variant">
                    <span class="material-symbols-outlined text-xl">format_italic</span>
                  </button>
                  <button class="p-2 hover:bg-surface-container-low rounded-full text-on-surface-variant">
                    <span class="material-symbols-outlined text-xl">link</span>
                  </button>
                </div>
              </div>
              <div
                id="bodyInput"
                class="min-h-[500px] text-lg leading-relaxed text-on-surface editor-prose max-w-none focus:outline-none"
                contenteditable="true"
              >
                <p class="text-surface-dim">Start typing your story here...</p>
              </div>
            </div>
          </div>
        </div>

        <aside class="w-80 border-l border-slate-100 bg-surface-container-low hidden xl:block p-8 overflow-y-auto">
          <div class="flex items-center justify-between mb-8">
            <h2 class="font-manrope font-bold text-lg text-on-surface">Post Settings</h2>
          </div>
          <div class="space-y-8">
            <div class="space-y-2">
              <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant"
                >URL Slug</label
              >
              <input
                id="slugInput"
                class="w-full bg-surface-container-lowest border-outline-variant/15 rounded-lg text-sm px-3 py-2 focus:border-tertiary focus:ring-4 focus:ring-tertiary/10"
                type="text"
                value="new-blog-post-draft"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant"
                >Category</label
              >
              <select
                id="categoryInput"
                class="w-full bg-surface-container-lowest border-outline-variant/15 rounded-lg text-sm px-3 py-2 focus:border-tertiary focus:ring-4 focus:ring-tertiary/10 appearance-none"
              >
                <option>Uncategorized</option>
                <option>Design</option>
                <option>Technology</option>
                <option>Editorial</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant"
                >Tags</label
              >
              <input
                id="tagsInput"
                class="w-full bg-surface-container-lowest border-outline-variant/15 rounded-lg text-sm px-3 py-2 focus:border-tertiary focus:ring-4 focus:ring-tertiary/10"
                placeholder="Add tag..."
                type="text"
              />
            </div>
            <div class="space-y-2">
              <label class="block text-xs font-bold uppercase tracking-wider text-on-surface-variant"
                >SEO Description</label
              >
              <textarea
                id="seoInput"
                class="w-full bg-surface-container-lowest border-outline-variant/15 rounded-lg text-sm px-3 py-2 focus:border-tertiary focus:ring-4 focus:ring-tertiary/10 resize-none"
                placeholder="Briefly describe your post for search engines..."
                rows="4"
              ></textarea>
            </div>
            <div class="pt-6 mt-6 border-t border-outline-variant/10">
              <button id="clearDraft" class="w-full text-error hover:bg-error/5 p-2 rounded-lg text-xs font-bold uppercase">
                Delete Draft
              </button>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <script>
      const storageKey = "zenithy_blog_draft_v1";
      const titleInput = document.getElementById("titleInput");
      const subtitleInput = document.getElementById("subtitleInput");
      const bodyInput = document.getElementById("bodyInput");
      const slugInput = document.getElementById("slugInput");
      const categoryInput = document.getElementById("categoryInput");
      const tagsInput = document.getElementById("tagsInput");
      const seoInput = document.getElementById("seoInput");
      const coverInput = document.getElementById("coverInput");
      const coverBox = document.getElementById("coverBox");

      let coverData = "";
      let slugTouched = false;

      function slugify(text) {
        return text
          .toLowerCase()
          .replace(/[^\w\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-")
          .slice(0, 60);
      }

      titleInput.addEventListener("input", () => {
        if (!slugTouched) {
          slugInput.value = slugify(titleInput.value || "new-blog-post");
        }
      });

      slugInput.addEventListener("input", () => {
        slugTouched = true;
      });

      coverInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          coverData = reader.result;
          coverBox.style.backgroundImage = `url(${coverData})`;
          coverBox.style.backgroundSize = "cover";
          coverBox.style.backgroundPosition = "center";
        };
        reader.readAsDataURL(file);
      });

      function collectDraft() {
        return {
          title: titleInput.value,
          subtitle: subtitleInput.value,
          body: bodyInput.innerHTML,
          slug: slugInput.value,
          category: categoryInput.value,
          tags: tagsInput.value,
          seo: seoInput.value,
          cover: coverData,
          updatedAt: new Date().toISOString(),
        };
      }

      function saveDraft() {
        localStorage.setItem(storageKey, JSON.stringify(collectDraft()));
        alert("Draft saved to this browser.");
      }

      function loadDraft() {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return;
        try {
          const draft = JSON.parse(raw);
          titleInput.value = draft.title || "";
          subtitleInput.value = draft.subtitle || "";
          bodyInput.innerHTML = draft.body || "";
          slugInput.value = draft.slug || "";
          categoryInput.value = draft.category || "Uncategorized";
          tagsInput.value = draft.tags || "";
          seoInput.value = draft.seo || "";
          coverData = draft.cover || "";
          if (coverData) {
            coverBox.style.backgroundImage = `url(${coverData})`;
            coverBox.style.backgroundSize = "cover";
            coverBox.style.backgroundPosition = "center";
          }
        } catch (err) {
          console.warn("Failed to load draft", err);
        }
      }

      function generateHtml() {
        const draft = collectDraft();
        const coverHtml = draft.cover
          ? `<div class="feature"><img src="${draft.cover}" alt="Cover image" /></div>`
          : "";
        return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${draft.title || "Zenithy Blog Post"}</title>
  <meta name="description" content="${draft.seo || ""}" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@300..700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:Inter, sans-serif;margin:0;background:#f8f9fa;color:#2b3437;}
    .container{width:min(800px,92vw);margin:0 auto;padding:64px 0;}
    h1{font-family:Manrope,sans-serif;font-size:clamp(32px,4vw,56px);margin:0 0 12px;}
    h2{font-family:Manrope,sans-serif;}
    .subtitle{font-size:20px;color:#586064;margin-bottom:28px;}
    .feature{width:min(1200px,92vw);margin:0 auto 48px;border-radius:24px;overflow:hidden;background:#f1f4f6;}
    .feature img{width:100%;display:block;object-fit:cover;}
    .article p{line-height:1.8;color:#586064;font-size:18px;margin-bottom:24px;}
  </style>
</head>
<body>
  ${coverHtml}
  <div class="container">
    <h1>${draft.title || ""}</h1>
    <div class="subtitle">${draft.subtitle || ""}</div>
    <article class="article">${draft.body || ""}</article>
  </div>
</body>
</html>`;
      }

      function downloadFile(filename, content) {
        const blob = new Blob([content], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      document.getElementById("saveDraft").addEventListener("click", saveDraft);
      document.getElementById("previewBtn").addEventListener("click", () => {
        const html = generateHtml();
        const win = window.open();
        if (win) {
          win.document.write(html);
          win.document.close();
        }
      });
      document.getElementById("previewText").addEventListener("click", () => {
        const html = generateHtml();
        const win = window.open();
        if (win) {
          win.document.write(html);
          win.document.close();
        }
      });
      document.getElementById("publishBtn").addEventListener("click", () => {
        const slug = slugInput.value || "new-post";
        const html = generateHtml();
        downloadFile(`${slug}.html`, html);
        alert(
          "已生成文章文件。请把下载的 HTML 放入 /portal/site/blog/posts/" +
            slug +
            "/index.html，然后提交并部署。"
        );
      });
      document.getElementById("clearDraft").addEventListener("click", () => {
        localStorage.removeItem(storageKey);
        alert("Draft cleared from this browser.");
      });

      loadDraft();
    </script>
  </body>
</html>
