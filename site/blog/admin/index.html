<!DOCTYPE html>
<html class="light" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Zenithy - 文章管理</title>
    <meta name="theme-color" content="#f8f9fa" />

    <link rel="alternate icon" href="../../favicon.svg" />

    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">

        theme: {
          extend: {
            colors: {
              "surface-tint": "#5d5e61",
              "inverse-primary": "#f9f9fc",
              "inverse-on-surface": "#9b9d9e",
              "on-primary-container": "#505254",
              surface: "#f8f9fa",
              "on-tertiary": "#f1faff",
              "on-surface": "#2b3437",
              "on-surface-variant": "#586064",
              "primary-fixed-dim": "#d4d4d7",
              "on-tertiary-fixed": "#003a47",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#dbe4e7",
              "surface-container-high": "#e3e9ec",
              "on-secondary-container": "#47535b",
              "tertiary-fixed-dim": "#83cee7",
              "on-tertiary-fixed-variant": "#00586c",
              secondary: "#556169",
              error: "#9f403d",
              "on-secondary-fixed": "#354148",
              "tertiary-container": "#91dcf6",
              "primary-container": "#e2e2e5",
              "secondary-dim": "#49555d",
              "secondary-container": "#d8e4ee",
              "secondary-fixed-dim": "#cad6e0",
              "surface-dim": "#d1dce0",
              "primary-fixed": "#e2e2e5",
              "on-primary": "#f7f7fa",
              "primary-dim": "#515255",
              "inverse-surface": "#0c0f10",
              "on-primary-fixed": "#3e3f42",
              "on-secondary-fixed-variant": "#515d65",
              "tertiary-dim": "#005b6f",
              "surface-variant": "#dbe4e7",
              "on-tertiary-container": "#004e60",
              background: "#f8f9fa",
              "secondary-fixed": "#d8e4ee",
              "tertiary-fixed": "#91dcf6",
              outline: "#737c7f",
              "surface-container": "#eaeff1",
              tertiary: "#03687e",
              "on-error": "#fff7f6",
              "error-dim": "#4e0309",
              "on-error-container": "#752121",
              "on-primary-fixed-variant": "#5a5c5e",
              "error-container": "#fe8983",
              "surface-bright": "#f8f9fa",
              "outline-variant": "#abb3b7",
              "on-secondary": "#f4faff",
              "on-background": "#2b3437",
              "surface-container-low": "#f1f4f6",
              primary: "#5d5e61",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
        vertical-align: middle;
      }
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3,
      .headline {
        font-family: "Manrope", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #abb3b740;
        border-radius: 10px;
      }
    </style>
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body class="admin-body admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <img class="admin-brand-mark" src="../../favicon.svg" alt="Zenithy" />
        <div>
          <strong>Zenithy</strong>
          <small>Blog Admin</small>
        </div>
      </div>
      <nav class="admin-nav" aria-label="后台导航">
        <a class="is-active" href="https://blog.zenithy.art/admin/">文章列表</a>
        <a class="" href="https://blog.zenithy.art/admin/editor.html">发布文章</a>
        <a class="" href="https://blog.zenithy.art/admin/projects.html">项目管理</a>
        <a class="" href="https://blog.zenithy.art/admin/messages.html">留言管理</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="mx-auto max-w-6xl px-8 pb-16">
        <section class="admin-card mb-10 p-8">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.3em] text-on-surface-variant">
                Content Repository
              </p>
              <h2 class="mt-2 text-3xl font-bold font-headline">文章管理</h2>
              <p class="mt-2 text-sm text-on-surface-variant">
                统一管理博客文章、标签与发布状态，确保内容始终与前台展示一致。
              </p>
            </div>
            <div class="flex gap-2">
              <div
                class="flex flex-col items-center justify-center rounded-2xl border border-outline-variant/30 bg-surface-container-lowest px-6 py-4"
              >
                <span class="text-xs text-on-surface-variant">总文章</span>
                <span class="mt-1 text-2xl font-bold" id="totalPosts">0</span>
              </div>
            </div>
          </div>
          <div class="mt-6 flex flex-wrap gap-2" id="adminTagFilters"></div>
        </section>

        <section class="space-y-6" id="adminPostList"></section>

        <div class="mt-12 flex items-center justify-between">
          <p class="text-sm font-medium text-on-surface-variant" id="postCount">
            当前显示 <span class="font-bold text-on-surface">0</span> / 0 篇
          </p>
          <div class="flex items-center gap-2">
            <button class="rounded-full p-2 text-on-surface-variant hover:bg-surface-container-low">
              <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <div class="flex items-center gap-1">
              <button class="h-8 w-8 rounded-full bg-tertiary text-xs font-bold text-on-tertiary">
                1
              </button>
              <button class="h-8 w-8 rounded-full text-xs font-medium text-on-surface hover:bg-surface-container">
                2
              </button>
              <button class="h-8 w-8 rounded-full text-xs font-medium text-on-surface hover:bg-surface-container">
                3
              </button>
              <span class="mx-1 text-on-surface-variant">...</span>
              <button class="h-8 w-8 rounded-full text-xs font-medium text-on-surface hover:bg-surface-container">
                31
              </button>
            </div>
            <button class="rounded-full p-2 text-on-surface-variant hover:bg-surface-container-low">
              <span class="material-symbols-outlined">chevron_right</span>
            </button>
          </div>
        </div>

        <footer class="mt-24 border-t border-outline-variant/10 pt-12 pb-8 text-center">
          <p class="mb-2 text-[10px] uppercase tracking-[0.3em] text-on-surface-variant">
            Zenithy 博客管理中心
          </p>
          <p class="text-xs text-on-surface-variant/60">
            Version 4.2.1-stable · © 2026 Zenithy Archive. All rights reserved.
          </p>
        </footer>
      </div>
    </main>
    <script>

      const adminList = document.getElementById("adminPostList");
      const totalPosts = document.getElementById("totalPosts");
      const postCount = document.getElementById("postCount");
      const manifestUrl = "../posts/manifest.json";
      const adminTagFilters = document.getElementById("adminTagFilters");
      const allTagLabel = "全部";

      function manifestRequest(url) {
        const marker = url.includes("?") ? "&" : "?";
        return url + marker + "v=" + Date.now();
      }

      function formatDate(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return date.toISOString().slice(0, 10);
      }

      function postTags(post) {
        if (Array.isArray(post.tags)) return post.tags.map((tag) => String(tag).trim()).filter(Boolean);
        if (typeof post.tags === "string") return post.tags.split(",").map((tag) => tag.trim()).filter(Boolean);
        return [];
      }

      function isPublishedPost(post) {
        if (!post || typeof post !== "object") return false;
        if (post.published === true) return true;
        if (post.published === false) return false;
        const status = String(post.status || "").trim().toLowerCase();
        if (!status) return true;
        if (["published", "publish", "live", "已发布", "已發佈"].includes(status)) return true;
        if (["draft", "草稿", "archived", "已归档", "已歸檔", "hidden", "private"].includes(status)) return false;
        return true;
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function editUrlForPost(post) {
        const slug = String((post && post.slug) || "").trim();
        const base = "https://blog.zenithy.art/admin/editor.html";
        return slug ? base + "?slug=" + encodeURIComponent(slug) : base;
      }

      function filteredByTag(posts, activeTag) {
        if (!activeTag || activeTag === allTagLabel) return posts;
        return posts.filter((post) => postTags(post).includes(activeTag));
      }

      function renderTagFilters(posts, activeTag, onSelect) {
        const tagSet = new Set();
        posts.forEach((post) => postTags(post).forEach((tag) => tagSet.add(tag)));
        const tags = [allTagLabel, ...Array.from(tagSet)];
        adminTagFilters.innerHTML = "";
        tags.forEach((tag) => {
          const btn = document.createElement("button");
          btn.className =
            "rounded-full px-5 py-2 text-sm font-semibold " +
            (tag === activeTag
              ? "bg-tertiary text-on-tertiary"
              : "text-on-surface-variant hover:bg-surface-container-low");
          btn.textContent = tag;
          btn.addEventListener("click", () => onSelect(tag));
          adminTagFilters.appendChild(btn);
        });
      }

      function renderAdmin(posts, activeTag) {
        const filtered = filteredByTag(posts, activeTag);
        const visibleCount = Math.min(filtered.length, 4);
        totalPosts.textContent = posts.length;
        postCount.innerHTML = '当前显示 <span class="font-bold text-on-surface">' + visibleCount + '</span> / ' + filtered.length + ' 篇';
        adminList.innerHTML = "";

        if (!filtered.length) {
          adminList.innerHTML = '<div class="rounded-xl bg-surface-container-lowest p-6 text-on-surface-variant">暂无文章，请点击“发布文章”开始发布。</div>';
          return;
        }

        filtered.slice(0, 4).forEach((post) => {
          const cover = post.cover || "https://lh3.googleusercontent.com/aida-public/AB6AXuCErMS3mJUiqkOxCCPAxIFo9BMu4MNXZQf7ztgmQ1vHzp8IXUFw2eT36L4hNbg8c926hqdggxfrB-TIm4bdFOG_SiPMSfStr8HoMEH6YhlenkOJ6cTwB-JM2yyRkhpE051_4-g3NT2d8NPR-ohqEHTmpqLsdnHvRTW8HBEU4Q3j9UZF1oNB3CpxLRsRBd21I6Wzg4LlZirMgzwuUwjKUDRXKrLIO_Cm5A9Mw3uppZqTnXT4hNuxGQYZFvY7LEQj_O-Y3yJRhPiMOgGT";
          const published = isPublishedPost(post);
          const status = published ? "已发布" : (post.status || "草稿");
          const statusColor = published ? "text-emerald-600" : "text-slate-500";
          const statusDot = published ? "bg-emerald-500" : "bg-slate-400";
          adminList.insertAdjacentHTML(
            "beforeend",
            '<div class="group relative rounded-xl border border-transparent bg-surface-container-lowest p-6 transition-all duration-300 hover:border-outline-variant/10 hover:shadow-xl">' +
              '<div class="grid grid-cols-12 items-center gap-6">' +
                '<div class="col-span-1"><img alt="Post Thumbnail" class="h-16 w-16 rounded-lg object-cover" src="' + escapeHtml(cover) + '" /></div>' +
                '<div class="col-span-5">' +
                  '<div class="mb-1 flex items-center gap-2">' +
                    '<span class="rounded bg-tertiary-container/30 px-2 py-0.5 text-[10px] font-bold uppercase tracking-widest text-on-tertiary-container">' + escapeHtml(post.category || "博客") + '</span>' +
                    '<span class="text-[10px] font-medium uppercase text-on-surface-variant">' + escapeHtml(post.readTime || "5 分钟") + '</span>' +
                  '</div>' +
                  '<h3 class="text-lg font-bold text-on-surface group-hover:text-tertiary transition-colors">' + escapeHtml(post.title || "Untitled Post") + '</h3>' +
                  '<p class="line-clamp-1 text-sm text-on-surface-variant">' + escapeHtml(post.excerpt || "") + '</p>' +
                '</div>' +
                '<div class="col-span-2">' +
                  '<div class="flex flex-col"><span class="mb-1 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">状态</span>' +
                    '<div class="flex items-center gap-2 text-sm font-semibold ' + statusColor + '"><span class="h-2 w-2 rounded-full ' + statusDot + '"></span>' + escapeHtml(status) + '</div>' +
                  '</div>' +
                '</div>' +
                '<div class="col-span-2">' +
                  '<div class="flex flex-col"><span class="mb-1 text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">更新日期</span>' +
                    '<span class="text-sm font-medium text-on-surface">' + escapeHtml(formatDate(post.updatedAt || post.date)) + '</span>' +
                  '</div>' +
                '</div>' +
                '<div class="col-span-2 flex justify-end gap-2">' +
                  '<a class="flex h-10 w-10 items-center justify-center rounded-full text-on-surface-variant hover:bg-tertiary-container/20 hover:text-tertiary" href="' + escapeHtml(editUrlForPost(post)) + '" title="编辑"><span class="material-symbols-outlined">edit</span></a>' +
                  '<button class="delete-post flex h-10 w-10 items-center justify-center rounded-full text-on-surface-variant hover:bg-error/10 hover:text-error" data-slug="' + escapeHtml(post.slug || "") + '" title="删除"><span class="material-symbols-outlined">delete</span></button>' +
                '</div>' +
              '</div>' +
            '</div>'
          );
        });
      }

      function downloadFile(filename, content) {
        const blob = new Blob([content], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      adminList.addEventListener("click", (event) => {
        const btn = event.target.closest(".delete-post");
        if (!btn) return;
        const slug = btn.dataset.slug;
        if (!slug) return;
        const ok = confirm("确认删除该文章？删除后请用新的 manifest.json 覆盖原文件。");
        if (!ok) return;

        fetch(manifestRequest(manifestUrl), { cache: "no-store" })
          .then((res) => {
            if (!res.ok) throw new Error("manifest request failed");
            return res.json();
          })
          .then((manifest) => {
            const posts = Array.isArray(manifest.posts) ? manifest.posts : [];
            const next = posts.filter((post) => post.slug !== slug);
            const updated = { pageSize: manifest.pageSize || 4, posts: next };
            downloadFile("manifest.json", JSON.stringify(updated, null, 2));
            alert("已生成更新后的 manifest.json。请替换 /portal/site/blog/posts/manifest.json 并提交到 Git。");
          })
          .catch(() => {
            alert("读取 manifest 失败，请检查 /blog/posts/manifest.json 是否可访问。");
          });
      });

      fetch(manifestRequest(manifestUrl), { cache: "no-store" })
        .then((res) => {
          if (!res.ok) throw new Error("manifest request failed");
          return res.json();
        })
        .then((manifest) => {
          const posts = Array.isArray(manifest.posts) ? manifest.posts : [];
          let activeTag = allTagLabel;
          renderTagFilters(posts, activeTag, (tag) => {
            activeTag = tag;
            renderAdmin(posts, activeTag);
          });
          renderAdmin(posts, activeTag);
        })
        .catch(() => renderAdmin([]));
    </script>
  </body>
</html>
