<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zenithy - 项目管理</title>
    <meta name="theme-color" content="#f8f9fa" />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="alternate icon" href="../../favicon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
            },
            colors: {
              surface: "#f8f9fa",
              "surface-container-low": "#f1f4f6",
              "surface-container-lowest": "#ffffff",
              "on-surface": "#2b3437",
              "on-surface-variant": "#586064",
              tertiary: "#03687e",
              "on-tertiary": "#f1faff",
              "tertiary-container": "#91dcf6",
              "on-tertiary-container": "#004e60",
              "outline-variant": "#abb3b7",
              error: "#9f403d",
            },
            borderRadius: {
              xl: "1.5rem",
              "2xl": "2rem",
              "3xl": "3rem",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3 {
        font-family: "Manrope", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
    </style>
  </head>
  <body class="bg-surface text-on-surface">
    <aside class="fixed left-0 top-0 flex h-screen w-64 flex-col bg-slate-50">
      <div class="p-8">
        <div class="mb-10 flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-900 text-white">
            <span class="material-symbols-outlined">auto_awesome</span>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">Zenithy</h1>
            <p class="text-xs font-medium uppercase tracking-widest text-on-surface-variant">
              项目管理
            </p>
          </div>
        </div>
        <nav class="space-y-1">
          <a
            class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-700"
            href="https://blog.zenithy.art/admin/"
          >
            <span class="material-symbols-outlined">article</span>
            文章列表
          </a>
          <a
            class="flex items-center gap-3 border-r-2 border-cyan-800 bg-slate-100/50 px-4 py-3 font-semibold text-cyan-800"
            href="https://blog.zenithy.art/admin/projects.html"
          >
            <span class="material-symbols-outlined">dashboard</span>
            项目管理
          </a>
          <a
            class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-slate-700"
            href="https://blog.zenithy.art/admin/messages.html"
          >
            <span class="material-symbols-outlined">mail</span>
            留言管理
          </a>
        </nav>
      </div>
    </aside>

    <main class="min-h-screen pl-64 pt-10">
      <div class="mx-auto max-w-6xl p-8">
        <div class="mb-8 flex flex-wrap items-center justify-between gap-4">
          <div>
            <h2 class="text-3xl font-bold font-headline">首页项目管理</h2>
            <p class="text-on-surface-variant">
              可视化编辑门户首页的项目卡片内容，支持封面预览、按钮配置与排序。
            </p>
            <div id="errorPanel" class="mt-4 hidden rounded-2xl border border-error/20 bg-red-50/60 p-4 text-sm text-red-700">
              <div class="flex items-center justify-between">
                <strong>发布前检查未通过</strong>
                <button id="errorToggle" class="text-xs text-red-700/80 hover:text-red-900" type="button">
                  收起
                </button>
              </div>
              <div id="errorList" class="mt-2"></div>
            </div>
          </div>
          <div class="flex flex-wrap gap-2">
            <button
              id="addProjectBtn"
              class="rounded-full border border-outline-variant/40 px-5 py-2 text-sm font-semibold text-on-surface-variant hover:bg-surface-container-low"
            >
              新增项目
            </button>
            <button
              id="previewBtn"
              class="rounded-full border border-outline-variant/40 px-5 py-2 text-sm font-semibold text-on-surface-variant hover:bg-surface-container-low"
            >
              预览
            </button>
            <button
              id="publishBtn"
              class="rounded-full bg-tertiary px-5 py-2 text-sm font-semibold text-on-tertiary"
            >
              发布
            </button>
          </div>
        </div>

        <div id="projectList" class="space-y-8"></div>
      </div>
    </main>

    <div
      id="previewModal"
      class="fixed inset-0 hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm z-50"
    >
      <div class="bg-white rounded-2xl w-[92vw] h-[88vh] shadow-2xl flex flex-col">
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-100">
          <span class="font-headline font-semibold text-slate-700">项目预览</span>
          <button id="closePreview" class="px-3 py-1 text-sm text-slate-500 hover:text-slate-900">
            关闭
          </button>
        </div>
        <div class="flex-1 overflow-auto p-6" id="previewContainer"></div>
      </div>
    </div>

    <script>
      const dataUrl = "/assets/projects.json";
      const list = document.getElementById("projectList");
      const previewModal = document.getElementById("previewModal");
      const previewContainer = document.getElementById("previewContainer");
      const closePreview = document.getElementById("closePreview");
      const addProjectBtn = document.getElementById("addProjectBtn");
      const errorPanel = document.getElementById("errorPanel");
      const errorList = document.getElementById("errorList");
      const errorToggle = document.getElementById("errorToggle");
      let errorsCollapsed = false;
      let projects = [];

      const emptyProject = () => ({
        id: "new-project",
        name: "New Project",
        english: "Project Subtitle",
        title: "项目主标题",
        description: "在这里填写项目简介，支持一句话定位与价值说明。",
        summaryLong: "在这里补充更完整的项目价值、使用场景和当前阶段，用于首页高级项目卡片。",
        projectType: "Product System",
        badge: "New Project",
        sequence: "03",
        keywords: ["Keyword 1", "Keyword 2"],
        features: ["关键能力 1", "关键能力 2"],
        index: "03 / New",
        primaryLabel: "进入项目",
        primaryUrl: "https://example.com",
        secondaryLabel: "查看手册",
        secondaryUrl: "#",
        tertiaryLabel: "",
        tertiaryUrl: "",
        quaternaryLabel: "",
        quaternaryUrl: "",
        image: "./assets/placeholder.jpg",
      });

      function normalizeImage(src) {
        if (!src) return "";
        if (src.startsWith("./assets/")) {
          return src.replace("./assets/", "../../assets/");
        }
        if (src.startsWith("/assets/")) {
          return "../../assets/" + src.replace("/assets/", "");
        }
        return src;
      }


      function escapeAttr(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function escapeTextarea(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function render() {
        list.innerHTML = "";
        if (!projects.length) {
          list.innerHTML =
            '<div class="rounded-2xl border border-slate-100 bg-white p-6 text-on-surface-variant">暂无项目数据。请检查 <code>/portal/site/assets/projects.json</code> 是否存在且可访问。</div>';
          return;
        }
        projects.forEach((p, idx) => {
          const wrapper = document.createElement("div");
          wrapper.className =
            "project-card rounded-2xl bg-white shadow-sm border border-slate-100 p-6 space-y-6";
          wrapper.setAttribute("draggable", "true");
          wrapper.dataset.index = String(idx);
          const imgSrc = normalizeImage(p.image || "");
          const featuresText = Array.isArray(p.features) ? p.features.join("\n") : "";
          const keywordsText = Array.isArray(p.keywords) ? p.keywords.join("\n") : "";
          wrapper.innerHTML = `
            <div class="flex flex-wrap items-center justify-between gap-2">
              <div>
                <h3 class="text-xl font-semibold" data-preview="name">${p.name || "未命名项目"}</h3>
                <p class="text-sm text-on-surface-variant" data-preview="title">${p.title || ""}</p>
              </div>
              <div class="flex gap-2">
                <span
                  class="flex items-center gap-1 rounded-full border border-outline-variant/40 px-3 py-1 text-xs text-on-surface-variant"
                >
                  <span class="material-symbols-outlined text-[18px]">drag_indicator</span>
                  拖拽排序
                </span>
                <button data-index="${idx}" class="delete-btn text-red-500 text-sm">删除</button>
              </div>
            </div>
            <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
              <div class="rounded-2xl border border-slate-100 bg-surface-container-lowest p-5 space-y-4">
                <div class="flex items-center justify-between">
                  <span class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant">预览卡片</span>
                  <span class="text-xs text-on-surface-variant" data-preview="index">${p.index || ""}</span>
                </div>
                <div class="rounded-2xl bg-white p-4 shadow-sm">
                  <div class="flex items-center justify-between text-xs text-on-surface-variant">
                    <span data-preview="projectType">${p.projectType || p.english || ""}</span>
                    <span data-preview="index">${p.index || ""}</span>
                  </div>
                  <span class="mt-3 inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600" data-preview="badge">${p.badge || "Project"}</span>
                  <h4 class="mt-2 text-lg font-bold" data-preview="name">${p.name || ""}</h4>
                  <p class="mt-1 text-sm text-on-surface-variant" data-preview="title">${p.title || ""}</p>
                  <p class="mt-3 text-sm text-on-surface" data-preview="description">${p.summaryLong || p.description || ""}</p>
                  <div class="mt-4 flex flex-wrap gap-2" data-preview="keywords">
                    ${
                      Array.isArray(p.keywords) && p.keywords.length
                        ? p.keywords.map((item) => `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">${item}</span>`).join("")
                        : ""
                    }
                  </div>
                  <div class="mt-4 flex flex-wrap gap-2" data-preview="buttons">
                    ${p.primaryLabel ? `<span class="rounded-full bg-tertiary px-3 py-1 text-xs font-semibold text-on-tertiary">${p.primaryLabel}</span>` : ""}
                    ${p.secondaryLabel ? `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">${p.secondaryLabel}</span>` : ""}
                    ${p.tertiaryLabel ? `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">${p.tertiaryLabel}</span>` : ""}
                  </div>
                </div>
                <div class="overflow-hidden rounded-2xl border border-slate-100">
                  <img class="h-44 w-full object-cover" src="${imgSrc}" alt="Project cover" data-preview="image" />
                </div>
              </div>
              <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <label class="text-sm text-on-surface-variant">项目 ID（勿随意修改）
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="id" data-index="${idx}" value="${escapeAttr(p.id)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">卡片序号
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="index" data-index="${idx}" value="${escapeAttr(p.index)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">项目名称
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="name" data-index="${idx}" value="${escapeAttr(p.name)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">项目角标
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="badge" data-index="${idx}" value="${escapeAttr(p.badge)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">英文副标题
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="english" data-index="${idx}" value="${escapeAttr(p.english)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">项目类型
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="projectType" data-index="${idx}" value="${escapeAttr(p.projectType)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">展示序号
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="sequence" data-index="${idx}" value="${escapeAttr(p.sequence)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">主标题
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="title" data-index="${idx}" value="${escapeAttr(p.title)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">封面图地址
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="image" data-index="${idx}" value="${escapeAttr(p.image)}" />
                  </label>
                </div>
                <label class="text-sm text-on-surface-variant">项目简介
                  <textarea class="input w-full border rounded-lg px-3 py-2" data-field="description" data-index="${idx}" rows="3">${escapeTextarea(p.description)}</textarea>
                </label>
                <label class="text-sm text-on-surface-variant">项目长摘要（首页高级卡片优先展示）
                  <textarea class="input w-full border rounded-lg px-3 py-2" data-field="summaryLong" data-index="${idx}" rows="4">${escapeTextarea(p.summaryLong)}</textarea>
                </label>
                <label class="text-sm text-on-surface-variant">关键词（每行一个）
                  <textarea class="input w-full border rounded-lg px-3 py-2" data-field="keywords" data-index="${idx}" rows="2">${escapeTextarea(keywordsText)}</textarea>
                </label>
                <label class="text-sm text-on-surface-variant">亮点（每行一个）
                  <textarea class="input w-full border rounded-lg px-3 py-2" data-field="features" data-index="${idx}" rows="2">${escapeTextarea(featuresText)}</textarea>
                </label>
                <div class="rounded-2xl border border-slate-100 bg-surface-container-lowest p-4">
                  <p class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant">亮点预览</p>
                  <ul class="mt-3 space-y-2 text-sm text-on-surface-variant" data-preview="features">
                    ${
                      Array.isArray(p.features) && p.features.length
                        ? p.features.map((item) => `<li>• ${item}</li>`).join("")
                        : "<li>暂无亮点</li>"
                    }
                  </ul>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <label class="text-sm text-on-surface-variant">主按钮文案
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="primaryLabel" data-index="${idx}" value="${escapeAttr(p.primaryLabel)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">主按钮链接
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="primaryUrl" data-index="${idx}" value="${escapeAttr(p.primaryUrl)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">次按钮文案
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="secondaryLabel" data-index="${idx}" value="${escapeAttr(p.secondaryLabel)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">次按钮链接
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="secondaryUrl" data-index="${idx}" value="${escapeAttr(p.secondaryUrl)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">第三按钮文案
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="tertiaryLabel" data-index="${idx}" value="${escapeAttr(p.tertiaryLabel)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">第三按钮链接
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="tertiaryUrl" data-index="${idx}" value="${escapeAttr(p.tertiaryUrl)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">第四按钮文案
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="quaternaryLabel" data-index="${idx}" value="${escapeAttr(p.quaternaryLabel)}" />
                  </label>
                  <label class="text-sm text-on-surface-variant">第四按钮链接
                    <input class="input w-full border rounded-lg px-3 py-2" data-field="quaternaryUrl" data-index="${idx}" value="${escapeAttr(p.quaternaryUrl)}" />
                  </label>
                </div>
              </div>
            </div>
          `;
          list.appendChild(wrapper);
        });
      }

      function collect() {
        const inputs = document.querySelectorAll(".input");
        inputs.forEach((input) => {
          const idx = Number(input.dataset.index);
          const field = input.dataset.field;
          if (!projects[idx]) return;
          if (field === "features" || field === "keywords") {
            projects[idx][field] = input.value
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean);
            return;
          }
          projects[idx][field] = input.value;
        });
      }

      function downloadFile(name, content) {
        const blob = new Blob(["\ufeff" + content], { type: "application/json;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = name;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      function defaultLabelForIndex(index) {
        const map = ["进入项目", "了解更多", "查看详情", "相关链接"];
        return map[index] || "查看";
      }

      function autoFixProjects(list) {
        list.forEach((p) => {
          if (!p.primaryLabel) p.primaryLabel = defaultLabelForIndex(0);
          if (!p.primaryUrl && p.primaryLabel) p.primaryUrl = "#";
          if (p.secondaryLabel && !p.secondaryUrl) p.secondaryUrl = "#";
          if (p.tertiaryLabel && !p.tertiaryUrl) p.tertiaryUrl = "#";
          if (p.quaternaryLabel && !p.quaternaryUrl) p.quaternaryUrl = "#";
        });
      }

      function validateProjects(list) {
        const errors = [];
        const ids = new Set();
        list.forEach((p, idx) => {
          const label = `第 ${idx + 1} 个项目`;
          if (!p.id) errors.push(`${label}缺少 id`);
          if (!p.name) errors.push(`${label}缺少项目名称`);
          if (!p.title) errors.push(`${label}缺少主标题`);
          if (!p.description) errors.push(`${label}缺少简介`);
          if (!p.primaryLabel) errors.push(`${label}主按钮文案为空`);
          if (!p.primaryUrl) errors.push(`${label}主按钮链接为空`);
          if (p.id) {
            if (ids.has(p.id)) errors.push(`${label} id 重复：${p.id}`);
            ids.add(p.id);
          }
          const urls = [
            p.primaryUrl,
            p.secondaryUrl,
            p.tertiaryUrl,
            p.quaternaryUrl,
          ].filter(Boolean);
          urls.forEach((url) => {
            if (url !== "#" && !/^https?:\/\//i.test(url)) {
              errors.push(`${label}链接格式不正确：${url}`);
            }
          });
        });
        return errors;
      }

      function renderErrors(errors) {
        if (!errors.length) {
          errorPanel.classList.add("hidden");
          errorList.innerHTML = "";
          return;
        }
        errorPanel.classList.remove("hidden");
        const listHtml =
          "<ul class='list-disc pl-5 space-y-1'>" +
          errors.map((err) => `<li>${err}</li>`).join("") +
          "</ul>";
        errorList.innerHTML = errorsCollapsed ? "" : listHtml;
        errorToggle.textContent = errorsCollapsed ? "展开" : "收起";
      }

      function clearFieldHighlights() {
        list.querySelectorAll(".input").forEach((input) => {
          input.classList.remove("ring-2", "ring-red-300");
        });
      }

      function highlightMissingFields() {
        clearFieldHighlights();
        projects.forEach((p, idx) => {
          const card = list.querySelector(`.project-card[data-index="${idx}"]`);
          if (!card) return;
          const highlight = (field) => {
            const input = card.querySelector(`.input[data-field="${field}"]`);
            if (input) input.classList.add("ring-2", "ring-red-300");
          };
          if (!p.id) highlight("id");
          if (!p.name) highlight("name");
          if (!p.title) highlight("title");
          if (!p.description) highlight("description");
          if (!p.primaryLabel) highlight("primaryLabel");
          if (!p.primaryUrl) highlight("primaryUrl");
        });
      }

      function buildPreviewCard(p) {
        const buttons = [
          [p.primaryLabel, p.primaryUrl],
          [p.secondaryLabel, p.secondaryUrl],
          [p.tertiaryLabel, p.tertiaryUrl],
          [p.quaternaryLabel, p.quaternaryUrl],
        ].filter((btn) => btn[0]);
        const features = Array.isArray(p.features) ? p.features : [];
        return `
          <article class="rounded-2xl border border-slate-100 bg-white p-6 shadow-sm">
            <div class="flex items-center justify-between text-xs text-on-surface-variant">
              <span>${p.projectType || p.english || ""}</span>
              <span>${p.index || ""}</span>
            </div>
            <span class="mt-3 inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">${p.badge || "Project"}</span>
            <h3 class="mt-2 text-xl font-bold">${p.name || ""}</h3>
            <p class="mt-1 text-sm text-on-surface-variant">${p.title || ""}</p>
            <p class="mt-3 text-sm text-on-surface">${p.summaryLong || p.description || ""}</p>
            ${
              Array.isArray(p.keywords) && p.keywords.length
                ? `<div class="mt-4 flex flex-wrap gap-2">
                    ${p.keywords.map((k) => `<span class="rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600">${k}</span>`).join("")}
                  </div>`
                : ""
            }
            ${
              features.length
                ? `<ul class="mt-4 space-y-2 text-sm text-on-surface-variant">
                    ${features.map((f) => `<li>• ${f}</li>`).join("")}
                  </ul>`
                : ""
            }
            <div class="mt-5 flex flex-wrap gap-2">
              ${buttons
                .map(
                  ([label, url], index) => `
                    <a class="rounded-full px-4 py-2 text-xs font-semibold ${
                      index === 0 ? "bg-tertiary text-on-tertiary" : "bg-slate-100 text-slate-600"
                    }" href="${url || "#"}">${label}</a>`
                )
                .join("")}
            </div>
            <div class="mt-5 overflow-hidden rounded-2xl border border-slate-100">
              <img class="h-40 w-full object-cover" src="${normalizeImage(p.image || "")}" alt="Project cover" />
            </div>
          </article>
        `;
      }

      function openPreview() {
        collect();
        previewContainer.innerHTML = `
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            ${projects.map((p) => buildPreviewCard(p)).join("")}
          </div>
        `;
        previewModal.classList.remove("hidden");
        previewModal.classList.add("flex");
      }

      function closeModal() {
        previewModal.classList.add("hidden");
        previewModal.classList.remove("flex");
      }

      function updatePreview(idx) {
        const card = list.querySelector(`.project-card[data-index="${idx}"]`);
        if (!card || !projects[idx]) return;
        const p = projects[idx];
        card.querySelectorAll('[data-preview="name"]').forEach((el) => {
          el.innerHTML = p.name || "";
        });
        card.querySelectorAll('[data-preview="title"]').forEach((el) => (el.textContent = p.title || ""));
        card.querySelectorAll('[data-preview="english"]').forEach((el) => (el.textContent = p.english || ""));
        card.querySelectorAll('[data-preview="projectType"]').forEach((el) => (el.textContent = p.projectType || p.english || ""));
        card.querySelectorAll('[data-preview="badge"]').forEach((el) => (el.textContent = p.badge || "Project"));
        card.querySelectorAll('[data-preview="index"]').forEach((el) => (el.textContent = p.index || ""));
        const desc = card.querySelector('[data-preview="description"]');
        if (desc) desc.textContent = p.summaryLong || p.description || "";
        const img = card.querySelector('[data-preview="image"]');
        if (img) img.src = normalizeImage(p.image || "");
        const keywordWrap = card.querySelector('[data-preview="keywords"]');
        if (keywordWrap) {
          keywordWrap.innerHTML = "";
          const keywords = Array.isArray(p.keywords) ? p.keywords : [];
          keywords.forEach((item) => {
            const span = document.createElement("span");
            span.className = "rounded-full bg-slate-100 px-3 py-1 text-xs font-semibold text-slate-600";
            span.textContent = item;
            keywordWrap.appendChild(span);
          });
        }
        const btnWrap = card.querySelector('[data-preview="buttons"]');
        if (btnWrap) {
          btnWrap.innerHTML = "";
          const buttons = [
            [p.primaryLabel, "bg-tertiary text-on-tertiary"],
            [p.secondaryLabel, "bg-slate-100 text-slate-600"],
            [p.tertiaryLabel, "bg-slate-100 text-slate-600"],
            [p.quaternaryLabel, "bg-slate-100 text-slate-600"],
          ];
          buttons.forEach(([label, classes]) => {
            if (!label) return;
            const span = document.createElement("span");
            span.className = `rounded-full px-3 py-1 text-xs font-semibold ${classes}`;
            span.textContent = label;
            btnWrap.appendChild(span);
          });
        }
        const featureList = card.querySelector('[data-preview="features"]');
        if (featureList) {
          const features = Array.isArray(p.features) ? p.features : [];
          featureList.innerHTML = features.length
            ? features.map((item) => `<li>• ${item}</li>`).join("")
            : "<li>暂无亮点</li>";
        }
      }

      document.getElementById("previewBtn").addEventListener("click", openPreview);
      document.getElementById("publishBtn").addEventListener("click", () => {
        collect();
        autoFixProjects(projects);
        render();
        const errors = validateProjects(projects);
        renderErrors(errors);
        highlightMissingFields();
        if (errors.length) {
          alert("发布前发现以下问题：\n\n" + errors.join("\n"));
          return;
        }
        downloadFile("projects.json", JSON.stringify({ projects }, null, 2));
        alert(
          "已生成 projects.json（UTF-8）。请直接替换 /portal/site/assets/projects.json，不要用记事本另存为。"
        );
      });
      closePreview.addEventListener("click", closeModal);
      addProjectBtn.addEventListener("click", () => {
        projects.push(emptyProject());
        render();
      });
      list.addEventListener("click", (event) => {
        const del = event.target.closest(".delete-btn");
        if (!del) return;
        const idx = Number(del.dataset.index);
        projects.splice(idx, 1);
        render();
      });
      list.addEventListener("input", (event) => {
        const input = event.target.closest(".input");
        if (!input) return;
        const idx = Number(input.dataset.index);
        const field = input.dataset.field;
        if (!projects[idx]) return;
        if (field === "features") {
          projects[idx][field] = input.value
            .split("\n")
            .map((line) => line.trim())
            .filter(Boolean);
        } else {
          projects[idx][field] = input.value;
        }
        updatePreview(idx);
        renderErrors(validateProjects(projects));
        highlightMissingFields();
      });

      errorToggle.addEventListener("click", () => {
        errorsCollapsed = !errorsCollapsed;
        renderErrors(validateProjects(projects));
      });


      let dragIndex = null;
      list.addEventListener("dragstart", (event) => {
        const card = event.target.closest(".project-card");
        if (!card) return;
        dragIndex = Number(card.dataset.index);
        event.dataTransfer.effectAllowed = "move";
        card.classList.add("ring-2", "ring-tertiary");
      });

      list.addEventListener("dragend", (event) => {
        const card = event.target.closest(".project-card");
        if (card) {
          card.classList.remove("ring-2", "ring-tertiary");
        }
        dragIndex = null;
      });

      list.addEventListener("dragover", (event) => {
        if (dragIndex === null) return;
        event.preventDefault();
      });

      list.addEventListener("drop", (event) => {
        const card = event.target.closest(".project-card");
        if (!card || dragIndex === null) return;
        const dropIndex = Number(card.dataset.index);
        if (Number.isNaN(dropIndex) || dropIndex === dragIndex) return;
        const moving = projects.splice(dragIndex, 1)[0];
        projects.splice(dropIndex, 0, moving);
        render();
      });

      fetch(dataUrl)
        .then((res) => res.json())
        .then((data) => {
          projects = Array.isArray(data.projects) ? data.projects : [];
          render();
        })
        .catch(() => {
          projects = [];
          render();
        });
    </script>
  </body>
</html>
